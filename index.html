  <!-- PWA Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        // Inline service worker as a blob so no extra file is needed
        const swCode = `
          const CACHE = 'slp-v2';
          const PRECACHE = [
            self.registration.scope,
            'https://cdn.jsdelivr.net/npm/chart.js@3.7.1/dist/chart.min.js',
            'https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css',
            'https://unpkg.com/react@17/umd/react.production.min.js',
            'https://unpkg.com/react-dom@17/umd/react-dom.production.min.js',
            'https://unpkg.com/@babel/standalone/babel.min.js'
          ];

          self.addEventListener('install', e => {
            e.waitUntil(
              caches.open(CACHE)
                .then(c => Promise.allSettled(PRECACHE.map(url => c.add(url).catch(() => {}))))
                .then(() => self.skipWaiting())
            );
          });

          self.addEventListener('activate', e => {
            e.waitUntil(
              caches.keys()
                .then(keys => Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k))))
                .then(() => self.clients.claim())
            );
          });

          self.addEventListener('fetch', e => {
            if (e.request.url.includes('api.github.com')) {
              e.respondWith(fetch(e.request).catch(() => new Response('{}', { headers: { 'Content-Type': 'application/json' } })));
              return;
            }
            e.respondWith(
              caches.match(e.request).then(cached => {
                if (cached) return cached;
                return fetch(e.request).then(resp => {
                  if (resp && resp.status === 200 && (resp.type === 'basic' || resp.type === 'cors')) {
                    caches.open(CACHE).then(c => c.put(e.request, resp.clone()));
                  }
                  return resp;
                }).catch(() => {
                  if (e.request.mode === 'navigate') return caches.match(self.registration.scope);
                });
              })
            );
          });

          // ── Break alarm scheduler ─────────────────────────────────────────────
          // The page posts { type:'SCHEDULE_BREAK_ALARM', endAt:<ms timestamp> }.
          // We keep the SW alive with waitUntil + a setTimeout so the notification
          // fires even while the page is backgrounded (works on Android Chrome;
          // iOS Safari has no background execution so we fall back to the
          // visibilitychange catch-up handler in the page instead).
          let breakAlarmTimer = null;

          self.addEventListener('message', e => {
            if (!e.data) return;

            if (e.data.type === 'SCHEDULE_BREAK_ALARM') {
              // Cancel any existing scheduled alarm
              if (breakAlarmTimer !== null) { clearTimeout(breakAlarmTimer); breakAlarmTimer = null; }

              const ms = Math.max(0, e.data.endAt - Date.now());
              const label = e.data.label || 'Break';

              e.waitUntil(new Promise(resolve => {
                breakAlarmTimer = setTimeout(async () => {
                  breakAlarmTimer = null;
                  try {
                    await self.registration.showNotification('⏰ ' + label + ' Over — Solo Leveling', {
                      body: 'Break has ended. Back to the grind, Hunter!',
                      icon: '/favicon.ico',
                      badge: '/favicon.ico',
                      vibrate: [300, 150, 300, 150, 600],
                      tag: 'break-alarm',
                      requireInteraction: true,
                      silent: false
                    });
                    // Wake all open tabs so the in-page alarm also triggers
                    const clients = await self.clients.matchAll({ type: 'window', includeUncontrolled: true });
                    clients.forEach(c => c.postMessage({ type: 'BREAK_ALARM_FIRED' }));
                  } catch (_err) {}
                  resolve();
                }, ms);
              }));
            }

            if (e.data.type === 'CANCEL_BREAK_ALARM') {
              if (breakAlarmTimer !== null) { clearTimeout(breakAlarmTimer); breakAlarmTimer = null; }
            }
          });

          self.addEventListener('notificationclick', e => {
            e.notification.close();
            e.waitUntil(
              self.clients.matchAll({ type: 'window', includeUncontrolled: true }).then(clients => {
                if (clients.length) { clients[0].focus(); return; }
                return self.clients.openWindow(self.registration.scope);
              })
            );
          });
        `;
        const blob = new Blob([swCode], { type: 'application/javascript' });
        const swUrl = URL.createObjectURL(blob);
        navigator.serviceWorker.register(swUrl, { scope: './' })
          .then(reg => console.log('SW registered'))
          .catch(err => console.log('SW registration failed (blob SW not supported on this host):', err));
      });
    }

  <!-- IndexedDB Helper for Local Folder Sync -->
  <script>
    const idb = {
      db: null,
      async init() {
        if (this.db) return this.db;
        return new Promise((resolve, reject) => {
          const req = indexedDB.open('slp_vault_db', 1);
          req.onupgradeneeded = () => req.result.createObjectStore('handles');
          req.onsuccess = () => { this.db = req.result; resolve(this.db); };
          req.onerror = () => reject(req.error);
        });
      },
      async get(key) {
        const db = await this.init();
        return new Promise((resolve, reject) => {
          const tx = db.transaction('handles', 'readonly');
          const req = tx.objectStore('handles').get(key);
          req.onsuccess = () => resolve(req.result);
          req.onerror = () => reject(tx.error);
        });
      },
      async set(key, val) {
        const db = await this.init();
        return new Promise((resolve, reject) => {
          const tx = db.transaction('handles', 'readwrite');
          tx.objectStore('handles').put(val, key);
          tx.oncomplete = () => resolve();
          tx.onerror = () => reject(tx.error);
        });
      },
      async del(key) {
        const db = await this.init();
        return new Promise((resolve, reject) => {
          const tx = db.transaction('handles', 'readwrite');
          tx.objectStore('handles').delete(key);
          tx.oncomplete = () => resolve();
          tx.onerror = () => reject(tx.error);
        });
      }
    };
  </script>

  <script type="text/babel" data-presets="react">

    // --- Core Data & Helpers ---
    const defaultStats = { INT: 0, STR: 0, Focus: 0, Consistency: 0, Mana: 0, Charisma: 0 };
    const defaultQuests =[
      { id: 1, name: "Deep Work (2 hrs)", stat: "Focus", statInc: 3, xp: 50, gold: 20, done: false, isPenalty: false, repeatable: true },

    const defaultRaids =[{ id: 1, name: "E-Rank Dungeon (Complete Project)", xpReq: 100, gold: 50, completed: false }];
    const defaultBosses =[{ id: 1, name: "Procrastination Demon", xpReq: 300, gold: 100, penalty: 5, active: false, completed: false }];
    const defaultRivals =[
      { id: 1, name: "Demon King Isagi", type: "Imaginary", rank: "A", focus: 85, str: 80, int: 90, achievements: "Won Blue Lock, Top Striker" },
      { id: 2, name: "Shadow Monarch Jinwoo", type: "Imaginary", rank: "S", focus: 95, str: 99, int: 85, achievements: "Cleared Double Dungeon, Monarch of Shadows" }
    ];

    // XP Formula: XP(L) = 200 × (L-1)^1.637
    // Calibrated milestones:
    // - D Rank (Level 10): ~7,300 XP (>= 14 days at 500 XP/day)
    // - Level 100: ~370,000 XP (~740 days, just over 2 years at 500 XP/day)
    function xpForLevel(level) { return level <= 1 ? 0 : Math.floor(200 * Math.pow(level - 1, 1.637)); }
    function calcLevel(xp) { let lvl = 1; while (lvl < 100 && xp >= xpForLevel(lvl + 1)) lvl++; return lvl; }

    const rankOrder =["E", "D", "C", "B", "A", "S", "National"];
    const defaultRanks =[
      { tier: "E", level: 1, name: "Weakest Hunter" }, 
      { tier: "D", level: 10, name: "Dungeon Survivor" },
      { tier: "C", level: 25, name: "Guild Member" }, 
      { tier: "B", level: 50, name: "Elite Hunter" },
      { tier: "A", level: 75, name: "Master Hunter" }, 
      { tier: "S", level: 90, name: "Shadow Monarch" },
      { tier: "National", level: 100, name: "World's Apex" }
    ].map(r => ({ ...r, xp: xpForLevel(r.level) }));

    function normalizeRanks(ranksInput) {
      const baseRanks = Array.isArray(ranksInput) ? ranksInput : defaultRanks;
      return baseRanks.map((rank, idx) => {
        const fallback = defaultRanks[idx] || defaultRanks[0];
        const level = Number(rank.level ?? fallback.level);
        return {
          ...fallback,
          ...rank,
          level,
          xp: xpForLevel(level)
        };
      });
    }

    // --- State Management ---
    const LOCAL_STATE_KEY = "slp_state_v15";
    const GIST_PAT_KEY = "sl_gist_pat";
    const GIST_ID_KEY  = "sl_gist_id";
    const DEVICE_ID_KEY = "sl_device_id";

    function getOrCreateDeviceId() {
      const existing = localStorage.getItem(DEVICE_ID_KEY);
      if (existing) return existing;
      const id = `dev-${Math.random().toString(36).slice(2, 10)}`;
      localStorage.setItem(DEVICE_ID_KEY, id);

      const d = new Date(dateInput);
      d.setHours(d.getHours() - rolloverHour, d.getMinutes(), d.getSeconds(), d.getMilliseconds());
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    }

        if (!('Notification' in window)) return 'unsupported';

          const notifId = Math.floor(endAt / 1000); // unique ID based on timestamp
          await Ln.schedule({
            notifications: [{
              title: '\u23F0 ' + label + ' Over \u2014 Solo Leveling',

              schedule: { at: new Date(endAt) },

        if (isCapacitorNative()) {
          const ok = await scheduleNativeAlarm(endAt, label);
          if (ok) return;

        try {

            const Ln = getCapNotifications();
            if (!Ln) return;
            // Register the listener for when a notification is tapped while app is in foreground/background
            await Ln.addListener('localNotificationActionPerformed', (notif) => {
              const type = notif?.notification?.extra?.type;
              if (type === 'break-alarm') {
                // User tapped the break alarm notification — ring the in-app alarm too
                playAlarm();
                addToast("Break over. Back to the grind!", "system");
                setBreakEndAt(null);

            });
            // Also listen for notifications delivered while the app is in the foreground
            await Ln.addListener('localNotificationReceived', (notif) => {
              const type = notif?.notification?.extra?.type;
              if (type === 'break-alarm') {
                // Notification arrived while app is open — also trigger in-app alarm
                playAlarm();
                addToast("Break over. Back to the grind!", "system");
                setBreakEndAt(null);

      };

      // ── GitHub Gist Sync ──────────────────────────────────────────────────────
      const pullGistState = async (showToast = false, forceApply = false) => {
        const id  = localStorage.getItem(GIST_ID_KEY)  || "";
        const pat = localStorage.getItem(GIST_PAT_KEY) || "";
        if (!id || gistPullInFlightRef.current) return false;
        gistPullInFlightRef.current = true;
        try {
          setGistStatus("Pulling...");
          const headers = { Accept: "application/vnd.github+json" };
          if (pat) headers["Authorization"] = `Bearer ${pat}`;
          const resp = await fetch(`https://api.github.com/gists/${id}`, { headers });
          if (!resp.ok) throw new Error(`GitHub ${resp.status}: ${resp.statusText}`);
          const data = await resp.json();
          const content = data.files?.["slp_state.json"]?.content;
          if (!content || content.trim() === "{}") {
            setGistStatus("No data in gist yet");
            if (showToast) addToast("No saved state found in gist yet.", "system");
            setGistConnected(true);
            return true;
          }
          const remoteState = JSON.parse(content);
          // Read timestamp directly from localStorage (not React state) to avoid stale-closure bug
          const localTs  = Number(loadState()?.syncUpdatedAt || 0);
          const remoteTs = Number(remoteState.syncUpdatedAt  || 0);
          // forceApply = true on startup: always take remote data so fresh page loads
          // don't falsely report "local is newer" just because the save hook ran on mount
          if (forceApply || remoteTs >= localTs) {
            applyImportedState(remoteState);
            saveState(remoteState);
            lastCloudPayloadRef.current = content;
            if (showToast) addToast("☁️ Gist sync loaded.", "system");
          } else if (showToast) {
            // Show how old the remote data is so user can decide
            const diffSec = Math.round((localTs - remoteTs) / 1000);
            const diffMin = Math.round(diffSec / 60);
            const age = diffMin >= 60 ? `${Math.round(diffMin/60)}h ago`
                      : diffMin > 1  ? `${diffMin}m ago`
                      : diffSec > 0  ? `${diffSec}s ago`
                      : "same time";
            addToast(`Local is newer (remote is from ${age}). Use Force Pull to override.`, "system");
          }
          setGistStatus("Synced");
          setGistConnected(true);
          return true;
        } catch (err) {
          const msg = err?.message || "Unknown error";
          setGistStatus("Pull failed: " + msg);
          if (showToast) addToast("Gist pull failed: " + msg, "error");
          return false;
        } finally {
          gistPullInFlightRef.current = false;

      };

      const pushGistState = async (snapshot, showToast = false) => {
        const id  = localStorage.getItem(GIST_ID_KEY)  || "";
        const pat = localStorage.getItem(GIST_PAT_KEY) || "";
        if (!id || !pat) return false;
        try {
          setGistStatus("Pushing...");
          const resp = await fetch(`https://api.github.com/gists/${id}`, {
            method: "PATCH",
            headers: {
              Authorization: `Bearer ${pat}`,
              Accept: "application/vnd.github+json",
              "Content-Type": "application/json",
            },

        try { navigator.vibrate && navigator.vibrate([400, 150, 400, 150, 800, 150, 400]); } catch (_e) {}
        try {
          const Ctx = window.AudioContext || window.webkitAudioContext;
          if (!Ctx) return;
          const ctx = new Ctx({ latencyHint: 'interactive' });
          alarmCtxRef.current = ctx;
          setIsAlarmRinging(true);
          ringBurst(ctx, 0);
          alarmIntervalRef.current = setInterval(() => {
            ringBurst(ctx, Date.now() / 1000);
            // Keep vibrating in rhythm
            try { navigator.vibrate && navigator.vibrate([200, 100]); } catch (_e) {}
          }, 320);
        } catch (_e) {}
      };

      const todayISO = getStudyDayKey();
      const dailyStudySeconds = React.useMemo(() => {
        return studySessions.reduce((acc, session) => {
          acc[session.date] = (acc[session.date] || 0) + (session.durationSec || 0);
          return acc;
        }, {});
      }, [studySessions]);

      const startOfToday = new Date();
      startOfToday.setHours(0, 0, 0, 0);
      const sevenDayRows = React.useMemo(() => {
        const startOfWeek = new Date(startOfToday);
        const day = startOfWeek.getDay();
        startOfWeek.setDate(startOfWeek.getDate() - day);
        return Array.from({ length: 7 }).map((_, idx) => {
          const d = new Date(startOfWeek);
          d.setDate(startOfWeek.getDate() + idx);
          const key = getStudyDayKey(d);
          return { date: key, seconds: dailyStudySeconds[key] || 0 };
        });
      }, [dailyStudySeconds]);

      const weeklyTotalSeconds = React.useMemo(() => sevenDayRows.reduce((sum, row) => sum + row.seconds, 0), [sevenDayRows]);
      const bestDayRow = React.useMemo(() => {
        if (!Object.keys(dailyStudySeconds).length) return null;
        return Object.entries(dailyStudySeconds).reduce((best, [date, seconds]) => {
          if (!best || seconds > best.seconds) return { date, seconds };
          return best;
        }, null);
      }, [dailyStudySeconds]);

      const currentStudySeconds = React.useMemo(() => {
        return currentSessionSeconds + (isStudyRunning && studySessionStart ? Math.floor((Date.now() - new Date(studySessionStart).getTime()) / 1000) : 0);
      }, [currentSessionSeconds, isStudyRunning, studySessionStart, timerTick]);
      const todayStudiedSeconds = React.useMemo(() => {
        return (dailyStudySeconds[todayISO] || 0) + currentStudySeconds;
      }, [dailyStudySeconds, todayISO, currentStudySeconds]);

      React.useEffect(() => {
        if (!isStudyRunning) return;
        const ticker = setInterval(() => {
          setTimerTick(prev => prev + 1);
        }, 1000);
        return () => clearInterval(ticker);
      }, [isStudyRunning]);

      React.useEffect(() => {
        if (!isTimerPoppedOut || !timerWidgetRef.current || typeof window.ResizeObserver !== "function") return;
        const observer = new ResizeObserver((entries) => {
          const entry = entries[0];
          if (!entry) return;
          const nextWidth = Math.round(entry.contentRect.width);
          const nextHeight = Math.round(entry.contentRect.height);
          setTimerWidgetSize(prev => {
            if (prev.width === nextWidth && prev.height === nextHeight) return prev;
            return { width: nextWidth, height: nextHeight };
          });
        });
        observer.observe(timerWidgetRef.current);
        return () => observer.disconnect();
      }, [isTimerPoppedOut]);

      React.useEffect(() => {
        if (!desktopTimerBridge?.updateState) return;
        desktopTimerBridge.updateState({
          seconds: currentStudySeconds,
          running: isStudyRunning
        });
      }, [desktopTimerBridge, currentStudySeconds, isStudyRunning]);

      React.useEffect(() => {
        if (!desktopTimerBridge?.onCommand) return;
        const unsubscribe = desktopTimerBridge.onCommand((command) => {
          if (command === "start") startStudySessionRef.current?.();
          if (command === "stop") stopStudySessionAndOpenTimerRef.current?.();
          if (command === "dock") setIsTimerPoppedOut(false);
        });
        return () => {
          if (typeof unsubscribe === "function") unsubscribe();
        };
      }, [desktopTimerBridge]);

      React.useEffect(() => {
        if (!isTimerDragging) return;
        const clamp = (v, min, max) => Math.min(Math.max(v, min), max);
        const onMove = (event) => {
          const point = event.touches ? event.touches[0] : event;
          const viewportW = window.innerWidth || 1280;
          const viewportH = window.innerHeight || 720;
          const cardW = timerWidgetSize.width || 250;
          const cardH = timerWidgetSize.height || 170;
          const nextX = clamp(point.clientX - timerDragOffsetRef.current.x, 8, viewportW - cardW - 8);
          const nextY = clamp(point.clientY - timerDragOffsetRef.current.y, 8, viewportH - cardH - 8);
          setTimerWidgetPos({ x: nextX, y: nextY });
        };
        const onEnd = () => setIsTimerDragging(false);
        window.addEventListener("mousemove", onMove);
        window.addEventListener("mouseup", onEnd);
        window.addEventListener("touchmove", onMove, { passive: true });
        window.addEventListener("touchend", onEnd);
        return () => {
          window.removeEventListener("mousemove", onMove);
          window.removeEventListener("mouseup", onEnd);
          window.removeEventListener("touchmove", onMove);
          window.removeEventListener("touchend", onEnd);
        };
      }, [isTimerDragging, timerWidgetSize.width, timerWidgetSize.height]);

      React.useEffect(() => {
        if (!breakEndAt) return;
        const remaining = new Date(breakEndAt).getTime() - Date.now();
        if (remaining <= 0) {
          playAlarm();
          addToast("Break over. Back to the grind!", "system");
          setBreakEndAt(null);
          return;
        }
        const timeout = setTimeout(() => {
          playAlarm();
          addToast("Break over. Back to the grind!", "system");
          setBreakEndAt(null);
        }, remaining);
        return () => clearTimeout(timeout);
      }, [breakEndAt]);

      React.useEffect(() => {
        return () => {
          stopAlarm();
          if (desktopTimerBridge?.closeMini) desktopTimerBridge.closeMini();
        };
      }, [desktopTimerBridge]);

      const startStudySession = () => {
        if (isStudyRunning) return;
        setIsStudyRunning(true);
        setStudySessionStart(new Date().toISOString());
        if (isDesktopApp && desktopTimerBridge?.openMini) desktopTimerBridge.openMini();
        addToast("Study session started. Stay focused!", "system");
      };

      const stopStudySession = () => {
        if (!isStudyRunning || !studySessionStart) return;
        const endISO = new Date().toISOString();
        const gainedSec = Math.max(0, Math.floor((new Date(endISO).getTime() - new Date(studySessionStart).getTime()) / 1000));
        const totalSec = currentSessionSeconds + gainedSec;
        const hours = totalSec / 3600;
        
        updateStreak();
        const multiplier = getStreakMultiplier();
        const corruptMult = getCorruptionRewardMult();
        // Core XP only from study — 15 XP per hour (balanced for 2-3 year max-level arc)
        const baseXpGain = Math.max(0, Math.floor(hours * 15));
        const baseGoldGain = Math.max(0, Math.floor(hours * 10));
        const xpGain = Math.max(0, Math.floor(baseXpGain * multiplier * corruptMult));
        const goldGain = Math.max(0, Math.floor(baseGoldGain * multiplier * corruptMult));
        const sessionDate = getStudyDayKey();

        if (totalSec > 0) {
          const newSession = { id: Date.now(), start: studySessionStart, end: endISO, durationSec: totalSec, date: sessionDate };
          setStudySessions(prev => [...prev, newSession]);
        }
        if (xpGain > 0) setXP(v => v + xpGain);
        if (goldGain > 0) setGold(v => v + goldGain);

        // INT: +1 per each NEW 4-hour daily threshold crossed (cumulative, not per session).
        // Compare how many 4-hr blocks existed before this session vs after.
        const todayPrevSec = dailyStudySeconds[sessionDate] || 0;
        const totalSecondsAfter = todayPrevSec + totalSec;
        const intBlocksBefore = Math.floor(todayPrevSec / (4 * 3600));
        const intBlocksAfter  = Math.floor(totalSecondsAfter / (4 * 3600));
        const rawIntGain = Math.max(0, intBlocksAfter - intBlocksBefore);
        const intGain = Math.max(0, Math.floor(rawIntGain * corruptMult));

        // Focus: +2 if this individual session was 2+ continuous hours (one-time per session)
        const focusGain = Math.max(0, Math.floor((hours >= 2 ? 2 : 0) * corruptMult));
        if (intGain > 0 || focusGain > 0) {
          setStats(s => ({
            ...s,
            INT: (s.INT || 0) + intGain,
            Focus: (s.Focus || 0) + focusGain
          }));
        }

        const previousBest = Object.entries(dailyStudySeconds).reduce((max, [date, sec]) => {
          if (date === sessionDate) return max;
          return Math.max(max, sec);
        }, 0);
        const todayTotalAfter = (dailyStudySeconds[sessionDate] || 0) + totalSec;
        if (todayTotalAfter > previousBest && !highStudyRewardDates.includes(sessionDate) && todayTotalAfter >= 1800) {
          // Best study day reward = LOOT only (gold bonus, no XP inflation)
          const bonusGold = Math.floor(40 * multiplier);
          setGold(v => v + bonusGold);
          setHighStudyRewardDates(prev => [...prev, sessionDate]);
          addToast(`New best study day! Bonus Loot: +${bonusGold} Gold (x${multiplier}).`, "loot");
        }

        setIsStudyRunning(false);
        setStudySessionStart(null);
        setCurrentSessionSeconds(0);
        const statSuffix = intGain > 0 ? ` • +${intGain} INT${focusGain > 0 ? ` • +${focusGain} Focus` : ''}` : (focusGain > 0 ? ` • +${focusGain} Focus` : '');
        const corruptNote = corruptMult < 1 ? ` [⚠️ Corrupted: ${Math.round(corruptMult * 100)}% rewards]` : '';
        updateWeeklyStats('log', `⏱ Study: ${formatDuration(totalSec)}${statSuffix}`);
        writeToDailyNote(`- [Study Session] ⏱ ${formatDuration(totalSec)} | +${xpGain} XP (x${multiplier}${corruptNote}), +${goldGain} Gold${statSuffix}`);
        addToast(`Session: ${formatDuration(totalSec)} • +${xpGain}XP • +${goldGain}G${statSuffix}${corruptNote}`, "loot");

        // Immediate cloud sync after timer stop
        forceGistPush(false);
      };

      const stopStudySessionAndOpenTimer = () => {
        stopStudySession();
        setActiveCategory("Eclipse");
        setGrindTab("Timer");
        setIsTimerPoppedOut(false);
        if (desktopTimerBridge?.closeMini) desktopTimerBridge.closeMini();
      };
      startStudySessionRef.current = startStudySession;
      stopStudySessionAndOpenTimerRef.current = stopStudySessionAndOpenTimer;

      const beginTimerWidgetDrag = (event) => {
        const point = event.touches ? event.touches[0] : event;
        timerDragOffsetRef.current = {
          x: point.clientX - timerWidgetPos.x,
          y: point.clientY - timerWidgetPos.y
        };
        setIsTimerDragging(true);
      };

      const startBreakTimer = async () => {
        const mins = Math.max(1, Math.min(120, Number(breakMinutes) || 5));
        setBreakMinutes(mins);
        const endAt = Date.now() + mins * 60 * 1000;
        setBreakEndAt(new Date(endAt).toISOString());

        // Request notification permission on first use
        const perm = await requestNotifPerm();

        if (perm === 'granted' || perm === 'unsupported') {
          // On native: create a high-importance notification channel + request battery exemption
          if (isCapacitorNative()) {
            try {
              const Ln = getCapNotifications();
              if (Ln) {
                // Create high-importance notification channel for max volume + vibration
                await Ln.createChannel({
                  id: 'break-alarm',
                  name: 'Break Alarm',
                  description: 'Break timer alarms that ring even when screen is off',
                  importance: 4, // IMPORTANCE_HIGH = 4, makes sound + pops on screen
                  vibration: true,
                  lights: true,
                  lightColor: '#a259ff'
                });
              }
            } catch (_e) {}
          }
          // Schedule the alarm notification
          await scheduleSwAlarm(endAt, `${mins}-min Break`);
          // Show a confirmation notification so the user knows it's set
          try {
            const reg = await navigator.serviceWorker.ready;
            await reg.showNotification('\u23F1\uFE0F Break Timer Started \u2014 Solo Leveling', {
              body: `${mins} minute break. You'll be notified when it's over.`,
              tag: 'break-started',
              silent: true,
              requireInteraction: false
            });
          } catch (_e) {
            try { new Notification('\u23F1\uFE0F Break Timer Started', { body: `${mins} min. Notification scheduled.`, silent: true }); } catch (_e2) {}
          }
          addToast(`\u23F1 Break started (${mins} min). Notification set.`, "system");
        } else if (perm === 'denied') {
          addToast(`\u23F1 Break started (${mins} min). \u26A0\uFE0F Notifications blocked \u2014 allow notifications for background alarm.`, "system");
        } else {
          addToast(`\u23F1 Break started (${mins} min). Allow notifications next time for background alarm.`, "system");
        }
      };

      // Open the phone's built-in Clock app timer as a fallback
      // This works on almost all Android phones including Vivo, Oppo, Xiaomi
      const openPhoneClockTimer = () => {
        const mins = Math.max(1, Math.min(120, Number(breakMinutes) || 5));
        const seconds = mins * 60;
        // Android's standard SET_TIMER intent \u2014 opens Clock app with timer pre-filled
        const intent = `#Intent;action=android.intent.action.SET_TIMER;i.android.intent.extra.length=${seconds};S.android.intent.extra.message=Solo%20Leveling%20Break;end`;
        const href = `intent:${intent}`;
        const a = document.createElement('a');
        a.href = href;
        a.style.display = 'none';
        document.body.appendChild(a);
        a.click();
        setTimeout(() => document.body.removeChild(a), 500);
        addToast(`Opening phone timer (${mins} min). Press Start in the Clock app.`, "system");
      };

      // Open app notification settings so user can ensure notifications are enabled
      const openAppNotificationSettings = () => {
        if (isCapacitorNative()) {
          try {
            const intent = 'intent:#Intent;action=android.settings.APP_NOTIFICATION_SETTINGS;package=com.sololeveling.productivity;S.android.provider.extra.APP_PACKAGE=com.sololeveling.productivity;end';
            const a = document.createElement('a');
            a.href = intent;
            a.style.display = 'none';
            document.body.appendChild(a);
            a.click();
            setTimeout(() => document.body.removeChild(a), 500);
          } catch (_e) {
            addToast("Go to Settings > Apps > Solo Leveling > Notifications.", "system");
          }
        } else {
          addToast("This feature only works in the APK version.", "system");
        }
      };

      // Open battery optimization settings so user can whitelist the app (critical for Vivo/Oppo/Xiaomi)
      const openBatteryOptimizationSettings = () => {
        if (isCapacitorNative()) {
          try {
            const intent = 'intent:#Intent;action=android.settings.IGNORE_BATTERY_OPTIMIZATION_SETTINGS;end';
            const a = document.createElement('a');
            a.href = intent;
            a.style.display = 'none';
            document.body.appendChild(a);
            a.click();
            setTimeout(() => document.body.removeChild(a), 500);
            addToast("Whitelist Solo Leveling in battery optimization settings.", "system");
          } catch (_e) {
            addToast("Go to Settings > Battery > Battery Optimization > Solo Leveling > Don't optimize.", "system");
          }
        } else {
          addToast("This feature only works in the APK version.", "system");
        }
      };

      // --- Anytype Journal Sync (in-app + remoteStorage) ---
      const linkVaultFolder = async () => {
          if (!isObsidianOwner) {
              addToast(`Anytype logging is locked by ${obsidianOwnerLabel || obsidianOwnerDeviceId}.`, "error");
              return;
          }
          if (!obsidianOwnerDeviceId) {
              setObsidianOwnerDeviceId(deviceId);
              setObsidianOwnerLabel(deviceLabel);
          }
          setVaultLinkedName("Anytype Cloud Journal");
          addToast("✅ Anytype journal logging enabled (no folder selection needed).", "system");
      };

      const unlinkVaultFolder = async () => {
          if (!isObsidianOwner) {
              addToast("Only the linked owner device can unlink Anytype sync.", "error");
              return;
          }
          setVaultLinkedName("");
          setObsidianOwnerDeviceId("");
          setObsidianOwnerLabel("");
          setDailyLogsByDate({});
          setPendingLogs([]);
          addToast("Anytype journal sync disabled for this save.", "system");
      };

      const writeToDailyNote = async (content) => {
          if (!isObsidianOwner) {
              addToast(`Anytype log locked to ${obsidianOwnerLabel || obsidianOwnerDeviceId}.`, "error");
              return false;
          }
          try {
              const dateStr = getStudyDayKey();
              // Always write locally first so logs are never lost when cloud pull fails.
              const existing = Array.isArray(dailyLogsByDate[dateStr]) ? dailyLogsByDate[dateStr] : [];
              const dedupe = new Set(existing);
              dedupe.add(content);
              const next = Array.from(dedupe);
              setDailyLogsByDate(prev => ({ ...prev, [dateStr]: next }));
              setPendingLogs(next);
              await syncBeforeJournalEdit(false);
              // Immediate cloud sync after every log entry
              await forceGistPush(false);
              return true;
          } catch (e) {
              console.error(e);
              addToast("❌ Failed to save Anytype journal entry.", "error");
              return false;
          }
      };

      const [dailyLogModal, setDailyLogModal] = React.useState(null);

      const openDailyNote = async () => {
          if (!isObsidianOwner) {
              addToast(`Open logs on owner device: ${obsidianOwnerLabel || obsidianOwnerDeviceId}.`, "error");
              return;
          }
          try {
              const synced = await syncBeforeJournalEdit(true);
              if (!synced) return;
              const dateStr = getStudyDayKey();
              const todayLogs = Array.isArray(dailyLogsByDate[dateStr]) ? dailyLogsByDate[dateStr] : [];
              if (todayLogs.length === 0) {
                setDailyLogModal("(No entries yet for today.)");
              } else {
                setPendingLogs(todayLogs);
                setDailyLogModal(todayLogs.join('\n'));
              }
              const anytypeUrl = buildAnytypeJournalUrl();
              if (anytypeUrl) window.open(anytypeUrl, '_blank');
          } catch(e) {
              console.error(e);
              addToast("❌ Failed to open daily log.", "error");
          }
      };

      const currentLevel = calcLevel(xp);
      const currentRank =[...ranks].reverse().find(r => xp >= r.xp) || ranks[0];
      const currentRankIdx = rankOrder.indexOf(currentRank.tier);

      // --- GACHA LOGIC ---
      // Gacha unlocks at streak milestones: 7, 14, 21, 28...
      const nextGachaMilestone = streak > 0 ? Math.ceil(streak / 7) * 7 : 7;
      const isOnMilestone = streak > 0 && streak % 7 === 0;
      const canSpin = isOnMilestone && lastSpinStreak !== streak;
      
      // GACHA = LOOT ONLY (gold, stats, buffs). NO XP — XP is for core actions only.
      const gachaPool =[
        { label: "JACKPOT",    sub: "+50 Gold",             color: "gold",   act: () => { setGold(g=>g+50); addToast("🎰 JACKPOT! +50 Gold — The System rewards you!", "loot"); updateWeeklyStats('log', '🎰 Gacha: JACKPOT — +50 Gold'); writeToDailyNote('- [Gacha] 🎰 JACKPOT — +50 Gold'); } },
        { label: "SHADOW DROP", sub: "+20 Gold, +3 Focus", color: "purple", act: () => { setGold(g=>g+20); setStats(s=>({...s, Focus: s.Focus+3})); addToast("💎 Shadow Drop! +20 Gold, +3 Focus", "loot"); updateWeeklyStats('log', '🎰 Gacha: SHADOW DROP — +20 Gold, +3 Focus'); writeToDailyNote('- [Gacha] 🎰 SHADOW DROP — +20 Gold, +3 Focus'); } },
        { label: "BOUNTY",     sub: "+15 Gold",             color: "blue",   act: () => { setGold(g=>g+15); addToast("Loot Acquired: +15 Gold", "loot"); updateWeeklyStats('log', '🎰 Gacha: BOUNTY — +15 Gold'); writeToDailyNote('- [Gacha] 🎰 BOUNTY — +15 Gold'); } },
        { label: "AWAKENING",  sub: "+3 Focus, +5 Gold",    color: "green",  act: () => { setStats(s=>({...s, Focus: s.Focus+3})); setGold(g=>g+5); addToast("Stat Buff: +3 Focus, +5 Gold", "system"); updateWeeklyStats('log', '🎰 Gacha: AWAKENING — +3 Focus, +5 Gold'); writeToDailyNote('- [Gacha] 🎰 AWAKENING — +3 Focus, +5 Gold'); } },
        { label: "GLITCH",     sub: "+5 DC",                color: "red",    act: () => { setDarkCrystals(d=>d+5); addToast("System Glitch! Dark Energy Absorbed (+5 DC)", "penalty"); updateWeeklyStats('log', '🎰 Gacha: GLITCH — +5 DC'); writeToDailyNote('- [Gacha] 🎰 GLITCH — +5 DC'); } },
        { label: "BLESSING",   sub: "+15 Gold, +2 INT",     color: "purple", act: () => { setGold(g=>g+15); setStats(s=>({...s, INT: s.INT+2})); addToast("System Blessing: +15 Gold, +2 INT!", "loot"); updateWeeklyStats('log', '🎰 Gacha: BLESSING — +15 Gold, +2 INT'); writeToDailyNote('- [Gacha] 🎰 BLESSING — +15 Gold, +2 INT'); } }
      ];

      const handleGachaSpin = () => {
        if(!canSpin || isSpinning) return;
        setIsSpinning(true);

        // Jackpot ~4% chance (roughly 1 in 25 pulls)
        const JACKPOT_CHANCE = 0.04;
        const winner = Math.random() < JACKPOT_CHANCE
          ? gachaPool[0]
          : gachaPool[1 + Math.floor(Math.random() * (gachaPool.length - 1))];

        const winningIndex = 24;
        const newItems = Array.from({length: 30}, () => gachaPool[Math.floor(Math.random() * gachaPool.length)]);
        newItems[winningIndex] = winner;

        setGachaItems(newItems);
        setGachaOffset('0px');

        // Double rAF: first waits for React commit, second for actual browser paint,
        // then we trigger the CSS transition. Item stride must match CSS (min-width + gap)
        // or mobile WebKit can mislayer / blank tiles during the long transform.
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            const narrow = typeof window !== 'undefined' && window.matchMedia('(max-width: 640px)').matches;
            const itemStride = narrow ? 110 : 150;
            const halfItem = narrow ? 50 : 75;
            const fuzz = Math.floor(Math.random() * 60) - 30;
            setGachaOffset(`calc(50% - ${halfItem}px - ${winningIndex * itemStride}px + ${fuzz}px)`);
          });
        });

        setTimeout(() => {
          setIsSpinning(false);
          setLastSpin(Date.now());
          setLastSpinStreak(streak);
          winner.act();
          forceGistPush(false);
          setTimeout(() => toggleModal('spin', false), 2500);
        }, 5600);
      };

      // --- Renders ---
      if (!isUnlocked) {
        return (
          <div className="min-h-screen flex items-center justify-center bg-[#0f1115]">
            <div className="sl-glass p-8 text-center max-w-sm w-full shadow-[0_0_50px_#a259ff33]">
              <h1 className="text-3xl font-black glow-purple mb-6 uppercase tracking-widest">System Locked</h1>
              <p className="text-gray-400 mb-6 text-sm">Enter Hunter Identification Sequence.</p>
              <input type="password" placeholder="Password" className="sl-modal-input text-center font-bold tracking-widest" value={loginInput} onChange={e=>setLoginInput(e.target.value)} onKeyDown={e=>{if(e.key==='Enter') { if(loginInput === appPassword || !appPassword) setIsUnlocked(true); else addToast("❌ Access Denied", "error"); }}} />
              <button className="sl-btn w-full py-3 mt-2" onClick={() => { if(loginInput === appPassword || !appPassword) { setIsUnlocked(true); addToast("Welcome back, Player.", "system"); } else addToast("❌ Access Denied", "error"); }}>Awaken</button>
            </div>
            <div className="toast-container">
              {toasts.map(t => <div key={t.id} className={`toast-item ${t.type}`}>{t.msg}</div>)}
            </div>
          </div>
        );
      }

      return (
        <div className={`sl-panel p-4 md:p-6 pb-20 ${darkCrystals >= 30 ? 'sl-panel-corrupted' : ''}`}>
          
          {darkCrystals >= 30 && (
            <div className="corrupt-skull-overlay">
              <div style={{fontSize: '3rem', textAlign: 'center', lineHeight: 1}}>☠️</div>
              <div style={{fontSize: '0.6rem', color: '#e53e3e', textAlign: 'center', fontWeight: 900, letterSpacing: '0.15em', textShadow: '0 0 8px #e53e3e', textTransform: 'uppercase'}}>Corrupted</div>
            </div>
          )}
          <div className="toast-container">
            {toasts.map(t => (
              <div key={t.id} className={`toast-item ${t.type}`}>
                {t.type === 'loot' && '✨ '}
                {t.type === 'penalty' && '⚠️ '}
                {t.type === 'error' && '❌ '}
                {t.type === 'system' && '📜 '}
                {t.type === 'combat' && '⚔️ '}
                {t.msg}
              </div>
            ))}
          </div>

          <div className="w-full max-w-6xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-3 mb-6">
            <div className="flex flex-wrap justify-center sm:justify-start gap-2 sm:gap-3 items-center w-full sm:w-auto">

                               addToast(`⚠️ D-Rank Efficiency (${pct}%). Penalty! +${dc} DC`, "penalty");
                               writeToDailyNote(`- [Efficiency] ⚠️ D-Rank — ${pct}% (${f}h / ${t}h) | PENALTY +${dc} DC`);
                             } else {
                               const dc = Math.round(30 + (39 - pct) * 1.2);
                               setDarkCrystals(d=>d+dc);
                               setXP(x=>Math.max(0, x-30));
                               setQuests(qs=>[{id:Date.now(), name:"Emergency Efficiency Restoration (2hrs deep work)", stat:"Focus", statInc:2, xp:0, gold:0, done:false, isPenalty:true, repeatable: false}, ...qs]);
                               updateWeeklyStats('log', `💀 Efficiency: ${pct}%`);
                               addToast(`💀 F-Rank Efficiency (${pct}%). System punishes failure! +${dc} DC, -30 XP`, "penalty");
                               writeToDailyNote(`- [Efficiency] 💀 F-Rank — ${pct}% (${f}h / ${t}h) | HEAVY PENALTY +${dc} DC, -30 XP`);
                             }
                           }}>Calculate & Submit</button>
                        </div>
                      </div>
                    )}

                    {systemTab === "Study Log" && (() => {
                      const SR_INTERVALS = [3, 5, 7, 14, 30];
                      const SR_LABELS = ["1st Review", "2nd Review", "3rd Review", "4th Review", "Monthly"];
                      const today = new Date(); today.setHours(0,0,0,0);

                      const addDays = (dateStr, n) => {
                        const d = new Date(dateStr); d.setHours(0,0,0,0); d.setDate(d.getDate() + n); return getStudyDayKey(d);
                      };

                      const dueToday = studyLog.filter(e => {
                        if(e.currentStage >= SR_INTERVALS.length) return false;
                        const due = new Date(e.nextReviewDate); due.setHours(0,0,0,0);
                        return due <= today;
                      });

                      const markReviewed = (id) => {
                        let reviewedEntry = null;
                        setStudyLog(log => log.map(e => {
                          if(e.id !== id) return e;
                          const nextStage = e.currentStage + 1;
                          const todayStr = getStudyDayKey();
                          const nextReviewDate = nextStage < SR_INTERVALS.length ? addDays(todayStr, SR_INTERVALS[nextStage]) : null;
                          const entry = { ...e, currentStage: nextStage, nextReviewDate, reviewHistory: [...(e.reviewHistory||[]), todayStr] };
                          reviewedEntry = { subject: e.subject, chapter: e.chapter, nextStage, totalStages: SR_INTERVALS.length };
                          writeToDailyNote(`- [Study Review] ✅ ${e.subject} — ${e.chapter} | Stage ${nextStage}/${SR_INTERVALS.length} (${nextStage < SR_INTERVALS.length ? SR_LABELS[nextStage]+' in '+SR_INTERVALS[nextStage]+'d' : 'MASTERED 🏆'})`);
                          setXP(x => x + 20); setStats(s=>({...s, INT: s.INT+1}));
                          addToast(`📚 Reviewed: ${e.chapter}! +20 XP, +1 INT`, "loot");
                          return entry;
                        }));
                        if (reviewedEntry) {
                          const stageInfo = reviewedEntry.nextStage < reviewedEntry.totalStages 
                            ? `Stage ${reviewedEntry.nextStage}/${reviewedEntry.totalStages}` 
                            : 'MASTERED 🏆';
                          updateWeeklyStats('log', `✅ Reviewed: ${reviewedEntry.subject} — ${reviewedEntry.chapter} (${stageInfo})`);
                        }
                      };

                      return (
                        <div className="fade-in flex flex-col gap-6">
                          {/* Due for Review */}
                          {dueToday.length > 0 && (
                            <div className="bg-yellow-900/20 border border-yellow-500/60 rounded-xl p-4 sm:p-5 shadow-[0_0_20px_#ecc94b22]">
                              <h3 className="text-yellow-400 font-black text-lg uppercase tracking-widest mb-4">⚠️ Due for Review ({dueToday.length})</h3>
                              <div className="flex flex-col gap-3">
                                {dueToday.map(e => (
                                  <div key={e.id} className="flex items-center justify-between bg-[#1a1c23] rounded-lg p-4 border border-yellow-500/40">
                                    <div>
                                      <div className="font-bold text-white">{e.chapter}</div>
                                      <div className="text-xs text-gray-400 mt-0.5">{e.subject} · <span className="text-yellow-400">{SR_LABELS[e.currentStage]}</span> · Studied {e.dateStudied}</div>
                                    </div>
                                    <button className="bg-gradient-to-r from-yellow-600 to-yellow-400 text-black font-black px-4 py-2 rounded text-xs uppercase hover:brightness-110 shadow-[0_0_10px_#ecc94b55]" onClick={()=>markReviewed(e.id)}>✓ Done</button>
                                  </div>
                                ))}
                              </div>
                            </div>
                          )}

                          {/* Log New Chapter */}
                          <div className="bg-[#1a1c23] rounded-xl p-4 sm:p-5 border border-purple-500/50 shadow-[0_0_20px_#a259ff11]">
                            <h3 className="font-black text-lg glow-purple uppercase tracking-widest mb-4">📖 Log New Chapter</h3>
                            <div className="flex flex-col gap-3">
                              <div className="flex gap-3">
                                <div className="flex-1"><label className="sl-modal-label">Subject</label><input id="studySubject" className="sl-modal-input" placeholder="e.g. Biochemistry" /></div>
                                <div className="flex-1"><label className="sl-modal-label">Chapter / Topic</label><input id="studyChapter" className="sl-modal-input" placeholder="e.g. Ch.4 Glycolysis" /></div>
                              </div>
                              <div className="flex gap-3">
                                <div className="flex-1"><label className="sl-modal-label">Date Completed</label><input id="studyDate" type="date" className="sl-modal-input" /></div>
                                <div className="flex-1"><label className="sl-modal-label">Time (optional)</label><input id="studyTime" type="time" className="sl-modal-input" /></div>
                              </div>
                              <button className="sl-btn py-3 uppercase tracking-widest text-sm" onClick={async ()=>{
                                const subj = document.getElementById('studySubject').value.trim();
                                const chap = document.getElementById('studyChapter').value.trim();
                                const dateVal = document.getElementById('studyDate').value;
                                const timeVal = document.getElementById('studyTime').value;
                                if(!subj || !chap) { addToast("Fill in subject and chapter.", "error"); return; }
                                const dateStr = dateVal || getStudyDayKey();
                                const entry = { id: Date.now(), subject: subj, chapter: chap, dateStudied: dateStr, timeStudied: timeVal || null, currentStage: 0, nextReviewDate: addDays(dateStr, SR_INTERVALS[0]), reviewHistory: [] };
                                setStudyLog(l => [entry, ...l]);
                                setXP(x=>x+30); setStats(s=>({...s, INT: s.INT+2}));
                                updateWeeklyStats('log', `📖 New Chapter: ${subj} — ${chap}`);
                                addToast(`📚 Logged: ${chap}! First review in 3 days. +30 XP, +2 INT`, "loot");
                                await writeToDailyNote(`- [Study Log] 📖 ${subj} — ${chap} | Date: ${dateStr}${timeVal ? ` ${timeVal}` : ''} | Next review: ${addDays(dateStr, SR_INTERVALS[0])}`);
                                document.getElementById('studySubject').value=''; document.getElementById('studyChapter').value=''; document.getElementById('studyDate').value=''; document.getElementById('studyTime').value='';
                              }}>Log Chapter</button>
                            </div>
                          </div>

                          {/* All Chapters */}
                          <div>
                            <h3 className="font-black text-lg glow-purple uppercase tracking-widest mb-4">All Chapters ({studyLog.length})</h3>
                            {studyLog.length === 0 && <div className="text-center text-gray-500 py-8 border border-dashed border-gray-700 rounded-lg">No chapters logged yet. Start studying, Hunter.</div>}
                            <div className="flex flex-col gap-3">
                              {studyLog.map(e => {
                                const mastered = e.currentStage >= SR_INTERVALS.length;
                                const dueDate = e.nextReviewDate ? new Date(e.nextReviewDate) : null;
                                if(dueDate) dueDate.setHours(0,0,0,0);
                                const overdue = !mastered && dueDate && dueDate < today;
                                const dueNow = !mastered && dueDate && dueDate.getTime() === today.getTime();
                                return (
                                  <div key={e.id} className={`bg-[#1a1c23] rounded-lg p-4 border flex items-center justify-between gap-4 ${mastered ? 'border-green-500/40' : overdue||dueNow ? 'border-yellow-500/50' : 'border-gray-700'}`}>
                                    <div className="flex-1 min-w-0">
                                      <div className="flex items-center gap-2 flex-wrap">
                                        <span className="font-bold text-white truncate">{e.chapter}</span>
                                        <span className="text-xs text-gray-500 bg-gray-800 px-2 py-0.5 rounded">{e.subject}</span>
                                        {e.dateStudied && <span className="text-xs text-purple-400 bg-purple-900/30 px-2 py-0.5 rounded border border-purple-500/20">📅 {e.dateStudied}{e.timeStudied ? ` ${e.timeStudied}` : ''}</span>}
                                        {mastered && <span className="text-xs bg-green-900/50 text-green-400 px-2 py-0.5 rounded border border-green-500/30">🏆 MASTERED</span>}
                                      </div>
                                      <div className="mt-2 flex gap-1 flex-wrap">
                                        {SR_INTERVALS.map((_, i) => (
                                          <div key={i} className={`text-[10px] px-2 py-0.5 rounded font-bold uppercase ${i < e.currentStage ? 'bg-green-900/40 text-green-400 border border-green-500/30' : i === e.currentStage && !mastered ? 'bg-yellow-900/40 text-yellow-400 border border-yellow-500/40' : 'bg-gray-800 text-gray-600 border border-gray-700'}`}>{SR_LABELS[i]}</div>
                                        ))}
                                      </div>
                                      {!mastered && <div className="text-xs text-gray-500 mt-1">Next: {e.nextReviewDate} {overdue ? <span className="text-red-400 font-bold">(OVERDUE)</span> : dueNow ? <span className="text-yellow-400 font-bold">(TODAY)</span> : ''}</div>}
                                    </div>
                                    <div className="flex gap-2 items-center shrink-0">
                                      {!mastered && (dueNow||overdue) && <button className="bg-gradient-to-r from-yellow-600 to-yellow-400 text-black font-black px-3 py-1.5 rounded text-xs uppercase hover:brightness-110" onClick={()=>markReviewed(e.id)}>✓ Review</button>}
                                      <button className="text-gray-600 hover:text-red-500 transition-colors" onClick={()=>setStudyLog(l=>l.filter(x=>x.id!==e.id))}>🗑️</button>
                                    </div>
                                  </div>
                                );
                              })}
                            </div>
                          </div>
                        </div>
                      );
                    })()}
                  </div>
                )}

                {activeCategory === "Combat" && (
                  <div className="fade-in">
                    <div className="flex gap-3 sm:gap-6 mb-4 sm:mb-6 border-b border-gray-700 pb-2 overflow-x-auto">
                      {["Raids", "Bosses", "Rivals"].map(tab => (
                        <button key={tab} className={`sl-tab ${combatTab === tab ? "sl-tab-active" : ""}`} onClick={() => setCombatTab(tab)}>{tab}</button>
                      ))}
                    </div>

                    {combatTab === "Raids" && (
                      <div>
                        <div className="flex justify-end mb-4"><button className="sl-btn px-4 py-1.5 text-xs" onClick={()=>toggleModal('raid', true)}>+ CREATE RAID</button></div>
                        <div className="space-y-4">
                          {raids.map((r, i) => (
                            <div key={r.id} className="bg-[#1a1c23] rounded-xl p-4 sm:p-5 border border-blue-500/30 flex items-center justify-between shadow-[0_0_15px_#3b82f611] hover:border-blue-400 transition-colors">
                              <div><div className="font-bold text-lg glow-blue uppercase">{r.name}</div><div className="text-sm text-gray-400 mt-1">Required: {r.xpReq} XP | Reward: <span className="text-yellow-400">{r.gold} Gold</span></div></div>
                              <div className="flex gap-3 items-center">
                                <button className={`sl-btn px-5 py-2 text-sm uppercase transition-all`} onClick={()=>{
                                  if(r.completed) { addToast("Gate already cleared.", "system"); return; }
                                  if(xp < r.xpReq) { addToast(`❌ Insufficient XP! Need ${r.xpReq}.`, "error"); return; }
                                  openBattleResultModal('raid', { raid: r, index: i });
                                }}>{r.completed ? 'Cleared' : 'Enter Gate'}</button>
                                <button className="text-gray-600 hover:text-red-500" onClick={()=>setRaids(rs=>rs.filter((_,idx)=>idx!==i))}>🗑️</button>
                              </div>
                            </div>
                          ))}
                          {raids.length===0 && <p className="text-center text-gray-500 mt-8 border border-dashed border-gray-700 rounded-lg p-6">No active Gates detected.</p>}
                        </div>
                      </div>
                    )}

                    {combatTab === "Bosses" && (
                       <div>
                        <div className="flex justify-end mb-4"><button className="sl-btn px-4 py-1.5 text-xs" onClick={()=>toggleModal('boss', true)}>+ SUMMON BOSS</button></div>
                        <div className="space-y-4">
                          {bosses.map((b, i) => (
                             <div key={b.id} className="bg-[#1a1c23] rounded-xl p-4 sm:p-5 border border-red-500/50 flex items-center justify-between relative overflow-hidden shadow-[0_0_20px_rgba(229,62,62,0.15)]">
                               <div className="absolute top-0 right-0 w-32 h-32 bg-red-500/10 rounded-bl-full pointer-events-none"></div>
                               <div><div className="font-black text-xl text-red-400 drop-shadow-[0_0_8px_#e53e3e] uppercase">{b.name}</div><div className="text-sm text-gray-400 mt-1">Req: {b.xpReq} XP | <span className="text-red-500 font-bold">Lethal Penalty: {b.penalty} DC</span></div></div>
                               <div className="flex gap-3 z-10">
                                <button className="bg-gradient-to-r from-red-600 to-red-800 text-white px-5 py-2 rounded font-bold uppercase shadow-[0_0_15px_#e53e3e66] hover:brightness-110 transition-all" onClick={()=>{
                                   if(b.completed) { addToast("Boss is already dead.", "system"); return; }
                                   if(xp < b.xpReq) { addToast(`❌ Insufficient XP! Need ${b.xpReq}.`, "error"); return; }
                                  openBattleResultModal('boss', { boss: b, index: i });
                                 }}>{b.completed ? 'Slain' : 'Challenge'}</button>
                                 <button className="text-gray-600 hover:text-red-500" onClick={()=>setBosses(bs=>bs.filter((_,idx)=>idx!==i))}>🗑️</button>
                               </div>
                             </div>
                          ))}
                        </div>
                       </div>
                    )}

                    {combatTab === "Rivals" && (
                      <div>
                        <div className="flex justify-end mb-4"><button className="sl-btn px-4 py-1.5 text-xs" onClick={()=>toggleModal('rival', true)}>+ REGISTER RIVAL</button></div>
                        <div className="grid sm:grid-cols-2 gap-5">
                          {rivals.map(r => (
                            <div key={r.id} className="bg-[#1a1c23] border border-purple-500/40 rounded-xl p-4 sm:p-5 relative shadow-[0_0_15px_#a259ff11] hover:-translate-y-1 transition-transform group">
                               <button className="absolute top-4 left-4 text-gray-600 hover:text-red-500 transition-colors z-10" onClick={(e) => { e.stopPropagation(); setRivals(rs => rs.filter(x => x.id !== r.id)); }}>🗑️</button>
                               <div className="absolute top-4 right-4 text-3xl font-black text-gray-800 group-hover:text-purple-900/50 transition-colors">{r.rank}</div>
                               <div className="font-black text-xl glow-purple mb-1 text-center uppercase">{r.name}</div>
                               <div className="text-xs text-gray-400 mb-4 text-center uppercase tracking-wider">{r.type} Competitor</div>
                               
                               <div className="grid grid-cols-3 gap-2 mb-4 text-center border-t border-b border-gray-700 py-3">
                                  <div><div className="text-[10px] text-gray-500 uppercase">Focus</div><div className="font-bold text-blue-400 text-lg drop-shadow-[0_0_5px_#3b82f6]">{r.focus || '??'}</div></div>
                                  <div><div className="text-[10px] text-gray-500 uppercase">STR</div><div className="font-bold text-red-400 text-lg drop-shadow-[0_0_5px_#e53e3e]">{r.str || '??'}</div></div>
                                  <div><div className="text-[10px] text-gray-500 uppercase">INT</div><div className="font-bold text-green-400 text-lg drop-shadow-[0_0_5px_#10b981]">{r.int || '??'}</div></div>
                               </div>

                               <button className="sl-btn w-full py-2 text-sm uppercase tracking-widest shadow-lg" onClick={()=>toggleModal('duel', r)}>Initiate Duel</button>
                            </div>
                          ))}
                        </div>
                      </div>
                    )}
                  </div>
                )}

                {/* 3. JOURNEY */}
                {activeCategory === "Journey" && (
                  <div className="fade-in flex flex-col gap-6 sm:gap-8">
                    <div className="flex gap-3 sm:gap-6 mb-4 sm:mb-6 border-b border-gray-700 pb-2 overflow-x-auto">
                      {["Main Arc", "Side Missions"].map(tab => (
                        <button key={tab} className={`sl-tab whitespace-nowrap ${journeyTab === tab ? "sl-tab-active" : ""}`} onClick={() => setJourneyTab(tab)}>{tab}</button>
                      ))}
                    </div>

                    {journeyTab === "Main Arc" && (
                      <div className="fade-in flex flex-col gap-8">
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                          <div className="bg-[#1a1c23] p-4 sm:p-6 rounded-xl border-l-4 border-yellow-500 shadow-[0_0_20px_#ecc94b11]">
                            <h3 className="text-xs text-yellow-500 font-bold uppercase tracking-widest mb-2">Life Mission</h3>
                            {!lifeMission ? (
                              <input type="text" className="bg-transparent border-b border-gray-600 text-white outline-none w-full py-1 text-lg font-bold" placeholder="Define your ultimate purpose..." onBlur={e => setLifeMission(e.target.value)} onKeyDown={e=>{if(e.key==='Enter') setLifeMission(e.target.value)}} />
                            ) : (
                              <div className="group cursor-pointer" onClick={()=>setLifeMission("")}>
                                <p className="text-xl font-bold text-white leading-snug">{lifeMission}</p>
                                <p className="text-xs text-gray-500 mt-2 opacity-0 group-hover:opacity-100 transition-opacity">Click to edit</p>
                              </div>
                            )}
                          </div>

                          <div className="bg-[#1a1c23] p-4 sm:p-6 rounded-xl border-l-4 border-purple-500 shadow-[0_0_20px_#a259ff11]">
                            <h3 className="text-xs text-purple-400 font-bold uppercase tracking-widest mb-2">Current Arc (Short-Term)</h3>
                            {!shortTermMission ? (
                              <input type="text" className="bg-transparent border-b border-gray-600 text-white outline-none w-full py-1 text-lg font-bold" placeholder="Your immediate focus..." onBlur={e => setShortTermMission(e.target.value)} onKeyDown={e=>{if(e.key==='Enter') setShortTermMission(e.target.value)}} />
                            ) : (
                              <div className="group cursor-pointer" onClick={()=>setShortTermMission("")}>
                                <p className="text-xl font-bold text-white leading-snug">{shortTermMission}</p>
                                <p className="text-xs text-gray-500 mt-2 opacity-0 group-hover:opacity-100 transition-opacity">Click to edit</p>
                              </div>
                            )}
                          </div>
                        </div>

                        <div className="bg-[#1a1c23] rounded-xl p-6 border border-gray-700 shadow-lg relative">
                          <div className="flex justify-between items-center mb-8">
                            <h3 className="text-xl font-black glow-gold uppercase tracking-widest">Hunter's Roadmap</h3>
                            <button className="sl-btn px-4 py-1.5 text-xs" onClick={()=>{
                              const title = prompt("Enter new milestone:");
                              if(title) { setRoadmap(r=>[...r, { id: Date.now(), title, completed: false }]); addToast("Milestone added to Roadmap.", "system"); }
                            }}>+ Add Milestone</button>
                          </div>
                          
                          <div className="timeline-container">
                            {roadmap.length === 0 && <p className="text-sm text-gray-500 italic">No milestones set. The path is unclear.</p>}
                            {roadmap.map(ms => (
                              <div key={ms.id} className={`relative flex justify-between items-center p-3 rounded-lg border ${ms.completed ? 'bg-gray-900 border-gray-800 opacity-60' : 'bg-[#23263a] border-purple-500/30'}`}>
                                <div className={`timeline-dot ${ms.completed ? 'timeline-dot-done' : ''}`}></div>
                                <span className={`text-lg font-bold ${ms.completed ? 'text-gray-500 line-through' : 'text-white'}`}>{ms.title}</span>
                                <div className="flex gap-3">
                                  <button className={`text-sm font-bold uppercase tracking-wider ${ms.completed ? 'text-yellow-500' : 'text-purple-400'}`} onClick={()=>{
                                    setRoadmap(r=>r.map(m=>m.id===ms.id ? {...m, completed: !m.completed} : m));
                                    if(!ms.completed) addToast("Milestone Achieved!", "loot");
                                  }}>{ms.completed ? 'Revert' : 'Achieve'}</button>
                                  <button className="text-gray-600 hover:text-red-500" onClick={()=>setRoadmap(r=>r.filter(m=>m.id!==ms.id))}>🗑️</button>
                                </div>
                              </div>
                            ))}
                          </div>
                        </div>
                      </div>
                    )}

                    {journeyTab === "Side Missions" && (
                      <div className="fade-in">
                        <div className="flex justify-between items-center mb-4">
                          <h3 className="font-bold text-lg glow-blue uppercase tracking-widest">Side Missions</h3>
                          <button className="sl-btn px-4 py-1.5 text-xs border border-blue-500/50" onClick={() => toggleModal('sideMission', true)}>+ ADD SIDE MISSION</button>
                        </div>
                        <div className="space-y-3">
                          {sideMissions.map((sm, i) => (
                            <div key={sm.id} className="flex justify-between items-center rounded-lg p-4 bg-[#1a1c23] border border-blue-500/30 hover:border-blue-400 transition-colors shadow-[0_0_15px_#3b82f611]">
                              <div>
                                <div className="font-bold text-lg text-white">{sm.name}</div>
                                <div className="text-xs text-blue-300 mt-1">Reward: {sm.stat ? `+${sm.statInc} ${sm.stat} • ` : ''} +{sm.xp} XP</div>

                                <button className="text-gray-600 hover:text-red-500 transition-colors" onClick={() => setSideMissions(sms => sms.filter((_, idx) => idx !== i))}>🗑️</button>
                              </div>
                            </div>

                        </div>
                      </div>
                    )}
                  </div>
                )}

                {/* 4. HUB */}
                {activeCategory === "Hub" && (
                  <div className="fade-in">
                    <div className="flex gap-3 sm:gap-6 mb-4 sm:mb-6 border-b border-gray-700 pb-2 overflow-x-auto">
                      <button className={`sl-tab ${hubTab === "Shop" ? "sl-tab-active" : ""}`} onClick={() => setHubTab("Shop")}>Light Shop</button>
                      <button className={`sl-tab ${hubTab === "DarkShop" ? "sl-tab-active" : ""}`} onClick={() => setHubTab("DarkShop")}>Dark Shop</button>
                      <button className={`sl-tab ${hubTab === "Journal" ? "sl-tab-active" : ""}`} onClick={() => setHubTab("Journal")}>Anytype & Sync</button>

                        <div className="flex justify-between items-center mb-8">

                          </div>
                        </div>
                        
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                          {(() => {

                            </div>
                          ))}
                        </div>
                      );
                    })()}
                  </div>
                  
                  {/* Activity Log Section */}
                  <div className="bg-[#1a1c23] rounded-xl p-4 mb-6 border border-purple-500/30">
                    <h3 className="text-sm font-bold text-purple-300 uppercase tracking-wider mb-3">
                      📜 Activity Log
                    </h3>
                    {(() => {
                      let logs = [];
                      if (archiveView === 'day') {
                        const mKey = getMonthKey(selectedArchiveDate);
                        const wKey = `Week ${getWeekOfMonth(selectedArchiveDate)}`;
                        const month = weeklyStats?.logsByMonth?.[mKey];
                        const week = month?.logsByWeek?.[wKey];
                        logs = week?.logsByDay?.[selectedArchiveDate] || [];
                      } else if (archiveView === 'week') {
                        const wKey = selectedArchiveWeek || weekKey;
                        const week = monthData?.logsByWeek?.[wKey];
                        Object.keys(week?.logsByDay || {}).sort().forEach(day => {
                          (week.logsByDay[day] || []).forEach(log => logs.push(`[${day}] ${log}`));
                        });
                      } else {
                        weeksInMonth.forEach(wKey => {
                          const week = monthData.logsByWeek[wKey];
                          Object.keys(week?.logsByDay || {}).sort().forEach(day => {
                            (week.logsByDay[day] || []).forEach(log => logs.push(`[${day}] ${log}`));
                          });
                        });
                      }
                      
                      if (logs.length === 0) {
                        return <div className="text-center text-gray-500 py-4 text-sm">No activity logged this period.</div>;
                      }
                      
                      return (
                        <div className="space-y-1 max-h-48 overflow-y-auto text-xs">
                          {logs.map((log, i) => (
                            <div key={i} className="text-gray-300 py-1 border-b border-gray-800 last:border-0">{log}</div>
                          ))}
                        </div>
                      );
                    })()}
                  </div>
                  
                  {/* Export Button */}
                  <button 
                    className="w-full bg-gradient-to-r from-emerald-600 to-emerald-800 text-white font-bold py-3 rounded uppercase text-sm mb-4"
                    onClick={async () => {
                      const text = getAllLogsForExport();
                      try {
                        await navigator.clipboard.writeText(text);
                        addToast("Archive copied! Paste into Anytype.", "system");
                      } catch (_e) {
                        // Show modal with text
                        const blob = new Blob([text], {type: 'text/markdown'});
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = `archive-${archiveView}-${new Date().toISOString().split('T')[0]}.md`;
                        a.click();
                        URL.revokeObjectURL(url);
                        addToast("Archive downloaded!", "system");
                      }
                    }}
                  >
                    📋 Copy Archive for Anytype
                  </button>
                </div>
              </ModalWrapper>
            );
          })()}

        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
