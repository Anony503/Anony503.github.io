<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Solo Leveling Productivity App</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@3.7.1/dist/chart.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
    body { background: #0f1115; min-height: 100vh; font-family: 'Fira Mono', 'Consolas', 'monospace'; margin: 0; padding: 0; color: #e0e0e0; overflow-x: hidden; }
    .sl-panel { background: rgba(24,26,32,0.92); border: 2px solid #a259ff; box-shadow: 0 0 32px 8px #a259ff33, 0 0 0 4px #0f1115 inset; min-height: 100vh; position: relative; }
    
    /* Typography & Glows */
    .sl-status-label { color: #a259ff; font-weight: bold; letter-spacing: 0.08em; font-size: 1.1rem; text-shadow: 0 0 8px #a259ff; }
    .glow-gold { color: #ecc94b; text-shadow: 0 0 8px #ecc94b; }
    .glow-red { color: #e53e3e; text-shadow: 0 0 8px #e53e3e; }
    .glow-purple { color: #b983ff; text-shadow: 0 0 8px #a259ff; }
    .glow-blue { color: #60a5fa; text-shadow: 0 0 8px #3b82f6; }
    .sl-glass { background: rgba(30, 32, 45, 0.85); border-radius: 1rem; box-shadow: 0 0 24px 4px rgba(162,89,255,0.1); border: 1px solid #a259ff44; backdrop-filter: blur(4px); }
    
    /* Buttons */
    .sl-btn { background: linear-gradient(90deg, #a259ff 0%, #4f1fff 100%); color: #fff; font-weight: bold; border-radius: 0.5rem; box-shadow: 0 0 8px 2px #a259ff55; transition: all 0.2s; border: none; cursor: pointer; text-transform: uppercase; letter-spacing: 1px;}
    .sl-btn:hover:not(:disabled) { filter: brightness(1.2); box-shadow: 0 0 16px 4px #a259ff; transform: translateY(-1px); }
    .sl-btn:disabled { filter: grayscale(0.8); cursor: not-allowed; opacity: 0.6; }
    
    /* Navigation */
    .sl-category-btn { flex: 1; background: rgba(20,22,30,0.8); color: #888; border: 2px solid transparent; padding: 0.75rem; text-align: center; font-weight: bold; font-size: 1rem; border-radius: 0.5rem; transition: all 0.3s; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
    .sl-category-btn-active { background: rgba(80, 60, 120, 0.2); border-color: #a259ff; color: #fff; box-shadow: 0 0 15px rgba(162, 89, 255, 0.3); text-shadow: 0 0 8px #a259ff; }
    .sl-category-btn:hover:not(.sl-category-btn-active) { background: rgba(80, 60, 120, 0.1); color: #ccc; }
    
    .sl-tab { color: #888; font-weight: bold; border-bottom: 2.5px solid transparent; transition: all 0.2s; font-size: 0.95rem; padding: 0.5rem 1rem; background: none; text-transform: uppercase; cursor: pointer; }
    .sl-tab-active { color: #fff; border-bottom: 2.5px solid #a259ff; text-shadow: 0 0 8px #a259ff; }

    /* Modals & Inputs */
    .sl-modal-bg { background: rgba(10, 10, 15, 0.95); backdrop-filter: blur(8px); }
    .sl-modal-box { background: #1a1c23; border-radius: 1rem; box-shadow: 0 0 40px 10px #a259ff44, 0 0 0 1px #a259ff; padding: 2rem; min-width: 380px; max-width: 90vw; color: #fff; position: relative; max-height: 90vh; overflow-y: auto;}
    .sl-modal-title { color: #b983ff; font-size: 1.5rem; font-weight: 800; margin-bottom: 1rem; text-shadow: 0 0 8px #a259ff; text-transform: uppercase; }
    .sl-modal-label { color: #a259ff; font-size: 0.9rem; font-weight: 600; margin-bottom: 0.3rem; display: block; text-transform: uppercase; }
    .sl-modal-input, .sl-modal-select { width: 100%; margin-bottom: 1.2rem; padding: 0.6rem 0.8rem; border-radius: 0.4rem; background: #23263a; color: #e0e0ff; border: 1px solid #a259ff55; font-size: 1rem; outline: none; transition: box-shadow 0.2s; font-family: inherit; }
    .sl-modal-input:focus, .sl-modal-select:focus { box-shadow: 0 0 0 2px #a259ff; }
    
    /* Stackable Toast Notifications */
    .toast-container { position: fixed; top: 1.5rem; right: 1.5rem; z-index: 9999; display: flex; flex-direction: column; gap: 0.75rem; pointer-events: none; }
    .toast-item { background: rgba(20, 22, 30, 0.95); backdrop-filter: blur(4px); padding: 1rem 1.5rem; border-radius: 0.5rem; border-left: 4px solid; color: #fff; font-weight: bold; font-size: 0.95rem; box-shadow: 0 10px 25px rgba(0,0,0,0.5); animation: slideIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; max-width: 350px; pointer-events: auto; }
    .toast-item.system { border-color: #a259ff; box-shadow: 0 0 15px rgba(162, 89, 255, 0.2); }
    .toast-item.loot { border-color: #ecc94b; box-shadow: 0 0 15px rgba(236, 201, 75, 0.2); }
    .toast-item.penalty { border-color: #e53e3e; box-shadow: 0 0 15px rgba(229, 62, 62, 0.2); }
    .toast-item.error { border-color: #e53e3e; background: rgba(50, 10, 10, 0.98); box-shadow: 0 0 20px rgba(229, 62, 62, 0.6); }
    .toast-item.combat { border-color: #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.2); }
    @keyframes slideIn { 0% { transform: translateX(120%); opacity: 0; } 100% { transform: translateX(0); opacity: 1; } }

    /* Custom Elements */
    .xp-bar-bg { width: 100%; height: 20px; background: #1a1c23; border-radius: 0.5rem; border: 1px solid #a259ff55; overflow: hidden; position: relative; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
    .xp-bar-fill { height: 100%; background: linear-gradient(90deg, #a259ff 0%, #ecc94b 100%); transition: width 0.4s cubic-bezier(.4,2,.6,1); box-shadow: 0 0 12px #a259ff88; }
    .xp-bar-label { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 0.85rem; font-weight: bold; text-shadow: 0 0 4px #000; }
    
    .timeline-container { border-left: 2px solid #a259ff55; margin-left: 1rem; padding-left: 1.5rem; position: relative; display: flex; flex-direction: column; gap: 1rem; }
    .timeline-dot { position: absolute; left: -1.8rem; top: 1.2rem; width: 0.8rem; height: 0.8rem; border-radius: 50%; background: #1a1c23; border: 2px solid #a259ff; transition: all 0.3s; }
    .timeline-dot-done { background: #ecc94b; border-color: #ecc94b; box-shadow: 0 0 10px #ecc94b; }

    .pulse-red { animation: pulseRed 1.5s infinite alternate; }
    @keyframes pulseRed { 0% { box-shadow: 0 0 0 0 rgba(229,62,62,0.2); border-color: #e53e3e55; } 100% { box-shadow: 0 0 15px 4px rgba(229,62,62,0.6); border-color: #e53e3e; } }
    .fade-in { animation: fadeIn 0.3s forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
    
    /* GACHA SLOT MACHINE CSS */
    .gacha-window {
        width: 100%; height: 130px;
        overflow: hidden; position: relative;
        border: 2px solid #a259ff; border-radius: 0.5rem;
        background: #0a0b10;
        box-shadow: 0 0 30px #a259ff44 inset;
        margin-bottom: 2rem;
    }
    .gacha-track {
        display: flex; gap: 10px; height: 100%;
        align-items: center; padding: 0;
        transition: transform 5s cubic-bezier(0.15, 0.9, 0.1, 1);
    }
    .gacha-item {
        min-width: 140px; height: 100px;
        background: #1a1c23; border-radius: 0.5rem;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        font-weight: 900; text-align: center; font-size: 1rem;
        border: 2px solid #444; position: relative;
    }
    .gacha-item.gold { border-color: #ecc94b; color: #ecc94b; box-shadow: 0 0 15px #ecc94b44 inset; text-shadow: 0 0 5px #ecc94b; }
    .gacha-item.purple { border-color: #a259ff; color: #a259ff; box-shadow: 0 0 15px #a259ff44 inset; text-shadow: 0 0 5px #a259ff; }
    .gacha-item.blue { border-color: #60a5fa; color: #60a5fa; box-shadow: 0 0 15px #3b82f644 inset; text-shadow: 0 0 5px #3b82f6; }
    .gacha-item.red { border-color: #e53e3e; color: #e53e3e; box-shadow: 0 0 15px #e53e3e44 inset; text-shadow: 0 0 5px #e53e3e; }
    .gacha-item.green { border-color: #10b981; color: #10b981; box-shadow: 0 0 15px #10b98144 inset; text-shadow: 0 0 5px #10b981; }
    
    .gacha-target-line {
        position: absolute; top: 0; bottom: 0; left: 50%;
        width: 4px; background: #fff;
        transform: translateX(-50%); z-index: 10;
        box-shadow: 0 0 15px #fff, 0 0 30px #a259ff;
    }
    .gacha-overlay {
        position: absolute; inset: 0; pointer-events: none;
        background: linear-gradient(90deg, #0a0b10 0%, transparent 20%, transparent 80%, #0a0b10 100%);
        z-index: 5;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- IndexedDB Helper for Local Folder Sync -->
  <script>
    const idb = {
      db: null,
      async init() {
        if (this.db) return this.db;
        return new Promise((resolve, reject) => {
          const req = indexedDB.open('slp_vault_db', 1);
          req.onupgradeneeded = () => req.result.createObjectStore('handles');
          req.onsuccess = () => { this.db = req.result; resolve(this.db); };
          req.onerror = () => reject(req.error);
        });
      },
      async get(key) {
        const db = await this.init();
        return new Promise((resolve, reject) => {
          const tx = db.transaction('handles', 'readonly');
          const req = tx.objectStore('handles').get(key);
          req.onsuccess = () => resolve(req.result);
          req.onerror = () => reject(tx.error);
        });
      },
      async set(key, val) {
        const db = await this.init();
        return new Promise((resolve, reject) => {
          const tx = db.transaction('handles', 'readwrite');
          tx.objectStore('handles').put(val, key);
          tx.oncomplete = () => resolve();
          tx.onerror = () => reject(tx.error);
        });
      },
      async del(key) {
        const db = await this.init();
        return new Promise((resolve, reject) => {
          const tx = db.transaction('handles', 'readwrite');
          tx.objectStore('handles').delete(key);
          tx.oncomplete = () => resolve();
          tx.onerror = () => reject(tx.error);
        });
      }
    };
  </script>

  <script src="https://unpkg.com/react@17/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/remotestoragejs@2.0.0-beta.8/release/remotestorage.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" data-presets="react">

    // --- Core Data & Helpers ---
    const defaultStats = { INT: 0, STR: 0, Focus: 0, Consistency: 0, Mana: 0, Charisma: 0 };
    const defaultQuests =[
      { id: 1, name: "Deep Work (2 hrs)", stat: "Focus", statInc: 3, xp: 50, gold: 20, done: false, isPenalty: false, repeatable: false },
      { id: 2, name: "Physical Training", stat: "STR", statInc: 2, xp: 30, gold: 10, done: false, isPenalty: false, repeatable: false }
    ];
    
    const defaultRaids =[{ id: 1, name: "E-Rank Dungeon (Complete Project)", xpReq: 100, gold: 50, completed: false }];
    const defaultBosses =[{ id: 1, name: "Procrastination Demon", xpReq: 300, gold: 100, penalty: 5, active: false, completed: false }];
    const defaultRivals =[
      { id: 1, name: "Demon King Isagi", type: "Imaginary", rank: "A", focus: 85, str: 80, int: 90, achievements: "Won Blue Lock, Top Striker" },
      { id: 2, name: "Shadow Monarch Jinwoo", type: "Imaginary", rank: "S", focus: 95, str: 99, int: 85, achievements: "Cleared Double Dungeon, Monarch of Shadows" }
    ];

    function xpForLevel(level) { return level <= 1 ? 0 : Math.floor(100 * Math.pow(level - 1, 1.3)); }
    function calcLevel(xp) { let lvl = 1; while (xp >= xpForLevel(lvl + 1)) lvl++; return lvl; }

    const rankOrder =["E", "D", "C", "B", "A", "S", "National"];
    const defaultRanks =[
      { tier: "E", level: 1, name: "Weakest Hunter" }, 
      { tier: "D", level: 10, name: "Dungeon Survivor" },
      { tier: "C", level: 25, name: "Guild Member" }, 
      { tier: "B", level: 50, name: "Elite Hunter" },
      { tier: "A", level: 75, name: "Master Hunter" }, 
      { tier: "S", level: 90, name: "Shadow Monarch" },
      { tier: "National", level: 100, name: "World's Apex" }
    ].map(r => ({ ...r, xp: xpForLevel(r.level) }));

    const defaultLightShopData =[
      { id: 1, name: "Mana Potion", desc: "Restore 5 Mana", price: 30, stat: "Mana", inc: 5 }, 
      { id: 2, name: "Focus Scroll", desc: "Boost Focus +3", price: 50, stat: "Focus", inc: 3 }
    ];
    const defaultDarkShopData =[
      { id: 1, name: "Devil's Contract", desc: "Gain 100 XP immediately", price: 5, type: "xp", inc: 100 },
      { id: 2, name: "Cleanse Penalty", desc: "Remove 1 active penalty", price: 10, type: "cleanse", inc: 0 }
    ];

    // --- State Management ---
    const LOCAL_STATE_KEY = "slp_state_v14";
    const RS_ADDRESS_KEY = "sl_rs_address";
    const DEVICE_ID_KEY = "sl_device_id";

    function getOrCreateDeviceId() {
      const existing = localStorage.getItem(DEVICE_ID_KEY);
      if (existing) return existing;
      const id = `dev-${Math.random().toString(36).slice(2, 10)}`;
      localStorage.setItem(DEVICE_ID_KEY, id);
      return id;
    }

    function loadState() { 
      try { const d = JSON.parse(localStorage.getItem(LOCAL_STATE_KEY)); return d || null; } 
      catch { return null; } 
    }
    function saveState(state) { 
      localStorage.setItem(LOCAL_STATE_KEY, JSON.stringify(state)); 
    }

    // --- Components ---
    function ModalWrapper({ title, onClose, children, borderClass="border-purple-500", shadowClass="shadow-[0_0_40px_#a259ff44]" }) {
      return (
        <div className="fixed inset-0 flex items-center justify-center z-[1000] sl-modal-bg fade-in p-4">
          <div className={`sl-modal-box w-full max-w-md border-2 ${borderClass} ${shadowClass}`}>
            <button className="absolute top-4 right-4 text-gray-400 hover:text-white text-2xl font-black transition-colors" onClick={onClose}>&times;</button>
            <div className="sl-modal-title">{title}</div>
            {children}
          </div>
        </div>
      );
    }

    // --- Main App Component ---
    function App() {
      const state = loadState() || {};
      
      // Authentication System
      const[appPassword, setAppPassword] = React.useState(state.appPassword || "");
      const[isUnlocked, setIsUnlocked] = React.useState(!state.appPassword);
      const [loginInput, setLoginInput] = React.useState("");

      // Game State
      const[stats, setStats] = React.useState(state.stats || {...defaultStats});
      const[xp, setXP] = React.useState(state.xp || 0);
      const [gold, setGold] = React.useState(state.gold || 0);
      const[darkCrystals, setDarkCrystals] = React.useState(state.darkCrystals || 0);
      const [streak, setStreak] = React.useState(state.streak || 0);
      const[lastSpin, setLastSpin] = React.useState(state.lastSpin || null);
      
      const[quests, setQuests] = React.useState(state.quests || defaultQuests);
      const[negativeQuests, setNegativeQuests] = React.useState(state.negativeQuests || []);
      const[sideMissions, setSideMissions] = React.useState(state.sideMissions || []);
      const[raids, setRaids] = React.useState(state.raids || defaultRaids);
      const[bosses, setBosses] = React.useState(state.bosses || defaultBosses);
      const[rivals, setRivals] = React.useState(state.rivals || defaultRivals);
      const[ranks, setRanks] = React.useState(state.ranks || defaultRanks);
      
      // Custom Shops
      const[lightShop, setLightShop] = React.useState(state.lightShop || defaultLightShopData);
      const[darkShop, setDarkShop] = React.useState(state.darkShop || defaultDarkShopData);
      
      const[lifeMission, setLifeMission] = React.useState(state.lifeMission || "");
      const[shortTermMission, setShortTermMission] = React.useState(state.shortTermMission || "");
      const[roadmap, setRoadmap] = React.useState(state.roadmap || []);
      const[studyLog, setStudyLog] = React.useState(state.studyLog || []);
      
      // Local Folder Sync State
      const[vaultLinkedName, setVaultLinkedName] = React.useState("");
      const hasNativeFS = typeof window.showDirectoryPicker === 'function';
      const fileInputRef = React.useRef(null);
      const importNoteRef = React.useRef(null);
      const [ffSyncModal, setFfSyncModal] = React.useState(false);
      const [pendingLogs, setPendingLogs] = React.useState([]);
      const [rsAddress, setRsAddress] = React.useState(localStorage.getItem(RS_ADDRESS_KEY) || "");
      const [rsConnected, setRsConnected] = React.useState(false);
      const [rsReady, setRsReady] = React.useState(false);
      const [rsStatus, setRsStatus] = React.useState("Idle");
      const [deviceId] = React.useState(getOrCreateDeviceId());
      const [obsidianOwnerDeviceId, setObsidianOwnerDeviceId] = React.useState(state.obsidianOwnerDeviceId || "");
      const [obsidianOwnerLabel, setObsidianOwnerLabel] = React.useState(state.obsidianOwnerLabel || "");
      const cloudSyncTimeoutRef = React.useRef(null);
      const lastCloudPayloadRef = React.useRef("");
      const rsRef = React.useRef(null);
      const rsClientRef = React.useRef(null);

      // UI States
      const[activeCategory, setActiveCategory] = React.useState("System"); 
      const[systemTab, setSystemTab] = React.useState("Quests"); 
      const[combatTab, setCombatTab] = React.useState("Raids"); 
      const[journeyTab, setJourneyTab] = React.useState("Main Arc"); 
      const[hubTab, setHubTab] = React.useState("Shop"); 
      const[shopTabType, setShopTabType] = React.useState("light");
      
      const[toasts, setToasts] = React.useState([]);
      const[modals, setModals] = React.useState({ quest: false, darkQuest: false, sideMission: false, raid: false, boss: false, rival: false, duel: null, spin: false, shopItem: false });

      // Gacha Wheel State
      const[gachaItems, setGachaItems] = React.useState([]);
      const[gachaOffset, setGachaOffset] = React.useState(0);
      const[isSpinning, setIsSpinning] = React.useState(false);

      // Startup: Check for existing Vault Handle
      React.useEffect(() => {
          idb.get('vault_handle').then(handle => {
              if (handle) setVaultLinkedName(handle.name);
          }).catch(console.error);
      },[]);

      React.useEffect(() => {
        if (!window.RemoteStorage) {
          setRsStatus("remoteStorage library not loaded.");
          return;
        }

        const rs = new window.RemoteStorage({ cache: true, logging: false });
        rs.access.claim("sololev", "rw");
        const client = rs.scope("/sololev/");
        client.declareType("sl-state", {});

        rs.on("ready", () => setRsReady(true));
        rs.on("connected", () => {
          setRsConnected(true);
          setRsStatus("Connected");
        });
        rs.on("not-connected", () => {
          setRsConnected(false);
          setRsStatus("Not connected");
        });
        rs.on("disconnected", () => {
          setRsConnected(false);
          setRsStatus("Disconnected");
        });
        rs.on("error", (err) => {
          setRsStatus(err?.message || "remoteStorage error");
        });

        rsRef.current = rs;
        rsClientRef.current = client;
      }, []);

      const applyImportedState = (incomingState) => {
        if (!incomingState || typeof incomingState !== "object") return;
        if (incomingState.appPassword !== undefined) setAppPassword(incomingState.appPassword || "");
        if (incomingState.stats) setStats({ ...defaultStats, ...incomingState.stats });
        if (incomingState.xp !== undefined) setXP(incomingState.xp || 0);
        if (incomingState.gold !== undefined) setGold(incomingState.gold || 0);
        if (incomingState.darkCrystals !== undefined) setDarkCrystals(incomingState.darkCrystals || 0);
        if (incomingState.streak !== undefined) setStreak(incomingState.streak || 0);
        if (incomingState.lastSpin !== undefined) setLastSpin(incomingState.lastSpin || null);
        if (Array.isArray(incomingState.quests)) setQuests(incomingState.quests);
        if (Array.isArray(incomingState.negativeQuests)) setNegativeQuests(incomingState.negativeQuests);
        if (Array.isArray(incomingState.sideMissions)) setSideMissions(incomingState.sideMissions);
        if (Array.isArray(incomingState.raids)) setRaids(incomingState.raids);
        if (Array.isArray(incomingState.bosses)) setBosses(incomingState.bosses);
        if (Array.isArray(incomingState.rivals)) setRivals(incomingState.rivals);
        if (Array.isArray(incomingState.ranks)) setRanks(incomingState.ranks);
        if (Array.isArray(incomingState.lightShop)) setLightShop(incomingState.lightShop);
        if (Array.isArray(incomingState.darkShop)) setDarkShop(incomingState.darkShop);
        if (incomingState.lifeMission !== undefined) setLifeMission(incomingState.lifeMission || "");
        if (incomingState.shortTermMission !== undefined) setShortTermMission(incomingState.shortTermMission || "");
        if (Array.isArray(incomingState.roadmap)) setRoadmap(incomingState.roadmap);
        if (Array.isArray(incomingState.studyLog)) setStudyLog(incomingState.studyLog);
        if (incomingState.obsidianOwnerDeviceId !== undefined) setObsidianOwnerDeviceId(incomingState.obsidianOwnerDeviceId || "");
        if (incomingState.obsidianOwnerLabel !== undefined) setObsidianOwnerLabel(incomingState.obsidianOwnerLabel || "");
      };

      const pullRemoteStorageState = async (showToast = false) => {
        if (!rsClientRef.current) return false;
        try {
          setRsStatus("Pulling...");
          const remoteState = await rsClientRef.current.getObject("state.json");
          if (remoteState && typeof remoteState === "object") {
            applyImportedState(remoteState);
            saveState(remoteState);
            lastCloudPayloadRef.current = JSON.stringify(remoteState);
            if (showToast) addToast("remoteStorage save loaded.", "system");
          } else if (showToast) {
            addToast("No remoteStorage state found yet.", "system");
          }
          setRsStatus("Connected");
          return true;
        } catch (err) {
          setRsStatus("Pull failed");
          if (showToast) addToast("remoteStorage pull failed.", "error");
          return false;
        }
      };

      const pushRemoteStorageState = async (snapshot, showToast = false) => {
        if (!rsClientRef.current) return false;
        try {
          setRsStatus("Pushing...");
          await rsClientRef.current.storeObject("sl-state", "state.json", snapshot);
          if (rsRef.current?.startSync) await rsRef.current.startSync();
          setRsStatus("Connected");
          if (showToast) addToast("remoteStorage save uploaded.", "system");
          return true;
        } catch (err) {
          setRsStatus("Push failed");
          if (showToast) addToast("remoteStorage push failed.", "error");
          return false;
        }
      };

      // Save Hook
      React.useEffect(() => {
        if (isUnlocked) {
          const snapshot = { 
            appPassword, stats, xp, gold, darkCrystals, streak, lastSpin,
            quests, negativeQuests, sideMissions, raids, bosses, rivals, ranks, 
            lightShop, darkShop,
            lifeMission, shortTermMission, roadmap, studyLog,
            obsidianOwnerDeviceId, obsidianOwnerLabel
          };
          saveState(snapshot);

          if (rsConnected && rsClientRef.current) {

                              const exp = btoa(JSON.stringify(loadState()));

                                navigator.clipboard.writeText(exp).then(() => addToast("Data Crystal Copied to Clipboard!", "system")).catch(() => {
                                  const el = document.createElement('textarea'); el.value = exp; el.style.position='fixed'; el.style.opacity='0';
                                  document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
                                  addToast("Data Crystal Copied to Clipboard!", "system");
                                });
                              } catch(e) {
                                const el = document.createElement('textarea'); el.value = exp; el.style.position='fixed'; el.style.opacity='0';
                                document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);

                              }

                            </div>
                          </div>
                        </div>
                      </div>

              </div>
              <label className="sl-modal-label text-blue-400">XP Reward</label><input id="smXp" type="number" defaultValue="40" className="sl-modal-input border-blue-500/50" />
              <button className="bg-gradient-to-r from-blue-600 to-blue-800 text-white font-bold w-full py-3 mt-2 text-lg rounded uppercase shadow-[0_0_15px_#3b82f666]" onClick={()=>{
                const n = document.getElementById('smName').value; if(!n) return;
                setSideMissions(sms =>[...sms, { id: Date.now(), name: n, stat: document.getElementById('smStat').value || null, statInc: parseInt(document.getElementById('smInc').value), xp: parseInt(document.getElementById('smXp').value) }]);
                addToast("Side Mission Logged.", "system"); toggleModal('sideMission', false);
              }}>Add Mission</button>
            </ModalWrapper>
          )}

          {modals.raid && (
            <ModalWrapper title="Create Raid (Project)" onClose={() => toggleModal('raid', false)} borderClass="border-blue-500" shadowClass="shadow-[0_0_40px_#3b82f644]">
              <label className="sl-modal-label text-blue-400">Raid / Project Name</label><input id="rName" className="sl-modal-input border-blue-500/50" placeholder="e.g. Finish React Course" />
              <label className="sl-modal-label text-blue-400">Required XP to Enter</label><input id="rXP" type="number" defaultValue="150" className="sl-modal-input border-blue-500/50" />
              <label className="sl-modal-label text-blue-400">Gold Reward</label><input id="rGold" type="number" defaultValue="50" className="sl-modal-input border-blue-500/50" />
              <button className="bg-gradient-to-r from-blue-700 to-blue-500 text-white font-bold w-full py-3 mt-2 text-lg rounded uppercase shadow-[0_0_15px_#3b82f666]" onClick={()=>{
                const n = document.getElementById('rName').value; if(!n) return;
                setRaids(rs =>[...rs, { id: Date.now(), name: n, xpReq: parseInt(document.getElementById('rXP').value), gold: parseInt(document.getElementById('rGold').value), completed: false }]);
                addToast("Gate Opened.", "combat"); toggleModal('raid', false);
              }}>Open Gate</button>
            </ModalWrapper>
          )}

          {modals.boss && (
            <ModalWrapper title="Summon Boss" onClose={() => toggleModal('boss', false)} borderClass="border-red-500" shadowClass="shadow-[0_0_40px_#e53e3e44]">
              <label className="sl-modal-label text-red-400">Boss Name (Habit to Break)</label><input id="bName" className="sl-modal-input border-red-500/50" placeholder="e.g. Sugar Addiction" />
              <label className="sl-modal-label text-red-400">Required XP</label><input id="bXP" type="number" defaultValue="500" className="sl-modal-input border-red-500/50" />
              <label className="sl-modal-label text-red-400">Penalty (Dark Crystals)</label><input id="bPen" type="number" defaultValue="10" className="sl-modal-input border-red-500/50" />
              <button className="bg-gradient-to-r from-red-600 to-red-900 text-white font-bold w-full py-3 mt-2 text-lg rounded uppercase shadow-[0_0_15px_#e53e3e66]" onClick={()=>{
                const n = document.getElementById('bName').value; if(!n) return;
                setBosses(bs =>[...bs, { id: Date.now(), name: n, xpReq: parseInt(document.getElementById('bXP').value), gold: parseInt(document.getElementById('bXP').value)*2, penalty: parseInt(document.getElementById('bPen').value), completed: false, active: true }]);
                addToast("Boss Summoned. Prepare yourself.", "combat"); toggleModal('boss', false);
              }}>Summon Entity</button>
            </ModalWrapper>
          )}

          {modals.rival && <AddRivalModal onClose={()=>toggleModal('rival', false)} onAdd={r=>{setRivals(rs=>[...rs,r]); addToast("New Rival Registered in System.", "combat");}} />}

          {/* DAILY LOG VIEWER MODAL */}
          {dailyLogModal !== null && (
            <div className="fixed inset-0 flex items-center justify-center z-[1000] sl-modal-bg fade-in p-4">
              <div className="sl-modal-box w-full max-w-2xl border-2 border-purple-500 shadow-[0_0_40px_#a259ff44]">
                <button className="absolute top-4 right-4 text-gray-400 hover:text-white text-2xl font-black transition-colors" onClick={()=>setDailyLogModal(null)}>&times;</button>
                <div className="sl-modal-title">📖 Today's Journal Log</div>
                <pre className="bg-[#0f1115] rounded-lg p-4 border border-purple-500/30 text-sm text-gray-300 whitespace-pre-wrap max-h-[60vh] overflow-y-auto font-mono leading-relaxed">{dailyLogModal}</pre>
                <button className="sl-btn w-full py-2 mt-4 text-sm uppercase tracking-widest" onClick={()=>setDailyLogModal(null)}>Close</button>
              </div>
            </div>
          )}
          {/* FIREFOX SYNC MODAL */}
          {ffSyncModal && (
            <ModalWrapper title="Vault Sync Setup" onClose={() => setFfSyncModal(false)} borderClass="border-yellow-500" shadowClass="shadow-[0_0_40px_#ecc94b44]">
              <div className="text-center mb-4">
                <div className="text-4xl mb-2">🦊</div>
                <p className="text-yellow-300 font-bold text-sm mb-2">Firefox / Linux Detected</p>
                <p className="text-gray-400 text-sm">Direct folder access (<code className="text-purple-400">showDirectoryPicker</code>) is not supported in Firefox. Instead, your logs will be <strong className="text-white">downloaded as .md files</strong> — just move them into your Obsidian vault folder.</p>
              </div>
              <div className="bg-[#0f1115] rounded-lg p-4 border border-yellow-500/30 text-sm text-gray-300 mb-4 space-y-2">
                <div className="flex gap-2 items-start"><span className="text-yellow-400 font-bold">1.</span><span>Enable download sync below — logs append to today's .md file.</span></div>
                <div className="flex gap-2 items-start"><span className="text-yellow-400 font-bold">2.</span><span>Each time you submit a confession, the file auto-downloads.</span></div>
                <div className="flex gap-2 items-start"><span className="text-yellow-400 font-bold">3.</span><span>Move the file to your Vault: <code className="text-purple-300">~/YourVault/Journal/</code></span></div>
                <div className="flex gap-2 items-start"><span className="text-yellow-400 font-bold">4.</span><span>You can also upload an existing note to append to it.</span></div>
              </div>
              <button className="sl-btn w-full py-3 font-bold uppercase tracking-widest shadow-[0_0_15px_#a259ff44]" onClick={()=>{
                setVaultLinkedName("⬇ Download Mode (Firefox)");
                setFfSyncModal(false);
                addToast("✅ Firefox Download Sync enabled!", "system");
              }}>Enable Download Sync</button>
            </ModalWrapper>
          )}

          {modals.duel && (() => {
            const r = modals.duel;
            const rRankIdx = rankOrder.indexOf(r.rank);
            const isUnder = currentRankIdx < rRankIdx;
            return (
              <div className="fixed inset-0 flex items-center justify-center z-[1000] sl-modal-bg fade-in p-4">
                <div className={`sl-modal-box w-full max-w-md border-2 ${isUnder ? 'border-red-500 shadow-[0_0_40px_#e53e3e55]' : 'border-purple-500 shadow-[0_0_40px_#a259ff55]'}`}>
                  <button className="absolute top-4 right-4 text-gray-400 hover:text-white text-2xl font-black transition-colors" onClick={()=>toggleModal('duel', null)}>&times;</button>
                  <div className="text-center mb-6">
                    <h2 className="text-3xl font-black uppercase tracking-widest mb-1">{r.name}</h2>
                    <div className="inline-block bg-gray-800 px-3 py-1 rounded border border-gray-600 text-sm font-bold">Rank {r.rank} {r.type}</div>
                  </div>
                  <div className="bg-[#1a1c23] border border-gray-600 rounded-lg p-4 mb-6 shadow-inner text-left">
                     <h4 className="text-xs text-gray-500 uppercase font-black mb-3 tracking-widest border-b border-gray-700 pb-1">Combat Intel</h4>
                     <div className="grid grid-cols-2 gap-4 mb-3">
                        <div><span className="text-purple-400 font-bold">Focus:</span> {r.focus}</div>
                        <div><span className="text-red-400 font-bold">STR:</span> {r.str}</div>
                        <div><span className="text-green-400 font-bold">INT:</span> {r.int}</div>
                     </div>
                     <div><span className="text-yellow-500 font-bold text-sm block mb-1">Achievements:</span><span className="text-gray-300 text-sm italic">{r.achievements}</span></div>
                  </div>
                  {isUnder ? (
                    <div className="bg-red-900/20 border border-red-500 p-4 rounded-lg text-center mb-6 pulse-red">
                      <h3 className="text-red-500 font-black text-xl mb-2 uppercase">⚠️ FATAL WARNING</h3>
                      <p className="text-sm text-gray-300">System detects massive power disparity. Your rank ({currentRank.tier}) is lower than the Rival ({r.rank}). Engaging will likely result in crushing defeat.</p>
                    </div>
                  ) : (
                    <div className="bg-green-900/20 border border-green-500 p-4 rounded-lg text-center mb-6">
                      <h3 className="text-green-400 font-black text-xl mb-2 uppercase">✅ MATCH APPROVED</h3>
                      <p className="text-sm text-gray-300">Your stats align. You are authorized to initiate combat.</p>
                    </div>
                  )}
                  <div className="flex gap-4">
                    <button className="bg-gray-700 text-white flex-1 py-3 rounded font-bold uppercase hover:bg-gray-600" onClick={()=>toggleModal('duel', null)}>Retreat</button>
                    <button className={`flex-1 py-3 rounded font-black uppercase shadow-lg ${isUnder ? 'bg-red-600 hover:bg-red-500 text-white' : 'bg-gradient-to-r from-purple-600 to-purple-400 text-white'}`} onClick={()=>{
                      toggleModal('duel', null);
                      if (isUnder) {
                         if(Math.random() > 0.95) { setXP(x => x + 300); addToast(`🤯 MIRACLE WIN against ${r.name}! +300 XP`, "loot"); }
                         else { setDarkCrystals(d => d + 20); setXP(x => Math.max(0, x - 50)); addToast(`🩸 CRUSHED by ${r.name}. Lost 50 XP, gained 20 DC.`, "penalty"); }
                      } else {
                         if(Math.random() > 0.20) { setXP(x => x + 100); setGold(g => g + 30); addToast(`🏆 Defeated ${r.name}! +100 XP, +30 Gold`, "combat"); }
                         else { setDarkCrystals(d => d + 5); addToast(`😤 Narrowly lost to ${r.name}. System grants +5 DC`, "system"); }
                      }
                    }}>{isUnder ? 'FIGHT ANYWAY' : 'ENGAGE COMBAT'}</button>
                  </div>
                </div>
              </div>
            );
          })()}

        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
