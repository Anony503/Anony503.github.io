  <!-- IndexedDB Helper for Local Folder Sync -->
  <script>
    const idb = {
      db: null,
      async init() {
        if (this.db) return this.db;
        return new Promise((resolve, reject) => {
          const req = indexedDB.open('slp_vault_db', 1);
          req.onupgradeneeded = () => req.result.createObjectStore('handles');
          req.onsuccess = () => { this.db = req.result; resolve(this.db); };
          req.onerror = () => reject(req.error);
        });
      },
      async get(key) {
        const db = await this.init();
        return new Promise((resolve, reject) => {
          const tx = db.transaction('handles', 'readonly');
          const req = tx.objectStore('handles').get(key);
          req.onsuccess = () => resolve(req.result);
          req.onerror = () => reject(tx.error);
        });
      },
      async set(key, val) {
        const db = await this.init();
        return new Promise((resolve, reject) => {
          const tx = db.transaction('handles', 'readwrite');
          tx.objectStore('handles').put(val, key);
          tx.oncomplete = () => resolve();
          tx.onerror = () => reject(tx.error);
        });
      },
      async del(key) {
        const db = await this.init();
        return new Promise((resolve, reject) => {
          const tx = db.transaction('handles', 'readwrite');
          tx.objectStore('handles').delete(key);
          tx.oncomplete = () => resolve();
          tx.onerror = () => reject(tx.error);
        });
      }
    };
  </script>

      const existing = localStorage.getItem(DEVICE_ID_KEY);

      const id = `dev-${Math.random().toString(36).slice(2, 10)}`;
      localStorage.setItem(DEVICE_ID_KEY, id);
      return id;

    function loadState() { 
      try { const d = JSON.parse(localStorage.getItem(LOCAL_STATE_KEY)); return d || null; } 
      catch { return null; }

    function saveState(state) { 
      localStorage.setItem(LOCAL_STATE_KEY, JSON.stringify(state));

    function getStudyDayKey(dateInput = Date.now(), rolloverHour = 2) {
      const d = new Date(dateInput);
      d.setHours(d.getHours() - rolloverHour, d.getMinutes(), d.getSeconds(), d.getMilliseconds());
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    }
    function shiftDayKey(dateStr, deltaDays) {
      const d = new Date(`${dateStr}T12:00:00`);
      d.setDate(d.getDate() + deltaDays);
      return getStudyDayKey(d);

      const [firebaseUser, setFirebaseUser] = React.useState(null);
      const [firebaseStatus, setFirebaseStatus] = React.useState("Not initialized");
      const [deviceId] = React.useState(getOrCreateDeviceId());
      const [obsidianOwnerDeviceId, setObsidianOwnerDeviceId] = React.useState(state.obsidianOwnerDeviceId || "");
      const [obsidianOwnerLabel, setObsidianOwnerLabel] = React.useState(state.obsidianOwnerLabel || "");
      const [anytypeJournalUrlTemplate, setAnytypeJournalUrlTemplate] = React.useState(state.anytypeJournalUrlTemplate || localStorage.getItem("sl_anytype_url_template") || "");
      const [anytypeSyncStatus, setAnytypeSyncStatus] = React.useState("Idle");
      const [syncUpdatedAt, setSyncUpdatedAt] = React.useState(state.syncUpdatedAt || 0);
      const rsConnectTimeoutRef = React.useRef(null);
      const rsPullInFlightRef = React.useRef(false);
      const rsPushInFlightRef = React.useRef(false);
      const rsAutoSyncTimeoutRef = React.useRef(null);
      const rsAutoConnectAttemptedRef = React.useRef(false);
      const syncUpdatedAtRef = React.useRef(state.syncUpdatedAt || 0);
      const firebaseUnsubscribeRef = React.useRef(null);
      const firebaseAuthUnsubscribeRef = React.useRef(null);

      const stopStudySessionRef = React.useRef(null);

      const rsClientRef = React.useRef(null);
      const alarmCtxRef = React.useRef(null);

      // UI States
      const[activeCategory, setActiveCategory] = React.useState("System"); 
      const[systemTab, setSystemTab] = React.useState("Quests"); 
      const[combatTab, setCombatTab] = React.useState("Raids"); 
      const[journeyTab, setJourneyTab] = React.useState("Main Arc"); 
      const[hubTab, setHubTab] = React.useState("Shop"); 
      const[shopTabType, setShopTabType] = React.useState("light");
      
      const[toasts, setToasts] = React.useState([]);
      const[modals, setModals] = React.useState({ quest: false, darkQuest: false, sideMission: false, raid: false, boss: false, rival: false, duel: null, spin: false, shopItem: false, weekly: false });

      // Gacha Wheel State
      const[gachaItems, setGachaItems] = React.useState([]);
      const[gachaOffset, setGachaOffset] = React.useState(0);
      const[isSpinning, setIsSpinning] = React.useState(false);

      // Startup: Anytype path uses in-app journal state + remoteStorage sync.

      React.useEffect(() => {
        syncUpdatedAtRef.current = Number(syncUpdatedAt || 0);
      }, [syncUpdatedAt]);

      const firebaseServices = window.FirebaseServices || null;
      const firebaseAuth = firebaseServices?.auth || null;
      const firebaseDb = firebaseServices?.db || null;
      const firebaseIsReady = Boolean(firebaseAuth && firebaseDb);

      React.useEffect(() => {
        if (!window.RemoteStorage) {
          setRsStatus("remoteStorage library not loaded.");
          return;
        }

        const rs = new window.RemoteStorage({ cache: true, logging: false });
        rs.access.claim("sololev", "rw");
        const client = rs.scope("/sololev/");
        client.declareType("sl-state", {});

        rs.on("ready", () => setRsReady(true));
        rs.on("connected", async () => {
          setRsConnected(true);
          setRsStatus("Connected");
          await pullRemoteStorageState(false);
        });
        rs.on("not-connected", () => {
          setRsConnected(false);
          setRsStatus("Not connected");
        });
        rs.on("disconnected", () => {
          setRsConnected(false);
          setRsStatus("Disconnected");
        });
        rs.on("error", (err) => {
          setRsStatus(err?.message || "remoteStorage error");
        });

        rsRef.current = rs;
        rsClientRef.current = client;

        return () => {
          try { rs.disconnect(); } catch (_e) {}
        };
      }, []);

      const applyImportedState = (incomingState) => {
        if (!incomingState || typeof incomingState !== "object") return;
        if (incomingState.appPassword !== undefined) setAppPassword(incomingState.appPassword || "");
        if (incomingState.stats) setStats({ ...defaultStats, ...incomingState.stats });
        if (incomingState.xp !== undefined) setXP(incomingState.xp || 0);
        if (incomingState.gold !== undefined) setGold(incomingState.gold || 0);
        if (incomingState.darkCrystals !== undefined) setDarkCrystals(incomingState.darkCrystals || 0);
        if (incomingState.streak !== undefined) setStreak(incomingState.streak || 0);
        if (incomingState.lastActivityDate !== undefined) setLastActivityDate(incomingState.lastActivityDate || null);
        if (incomingState.weeklyStats !== undefined) setWeeklyStats(incomingState.weeklyStats || { logsByMonth: {} });
        if (incomingState.lastSpin !== undefined) setLastSpin(incomingState.lastSpin || null);
        if (Array.isArray(incomingState.quests)) setQuests(incomingState.quests);
        if (Array.isArray(incomingState.negativeQuests)) setNegativeQuests(incomingState.negativeQuests);
        if (Array.isArray(incomingState.sideMissions)) setSideMissions(incomingState.sideMissions);
        if (Array.isArray(incomingState.raids)) setRaids(incomingState.raids);
        if (Array.isArray(incomingState.bosses)) setBosses(incomingState.bosses);
        if (Array.isArray(incomingState.rivals)) setRivals(incomingState.rivals);
        if (Array.isArray(incomingState.ranks)) setRanks(incomingState.ranks);
        if (Array.isArray(incomingState.lightShop)) setLightShop(incomingState.lightShop);
        if (Array.isArray(incomingState.darkShop)) setDarkShop(incomingState.darkShop);
        if (incomingState.lifeMission !== undefined) setLifeMission(incomingState.lifeMission || "");
        if (incomingState.shortTermMission !== undefined) setShortTermMission(incomingState.shortTermMission || "");
        if (Array.isArray(incomingState.roadmap)) setRoadmap(incomingState.roadmap);
        if (Array.isArray(incomingState.studyLog)) setStudyLog(incomingState.studyLog);
        if (!isStudyRunning) {
          if (incomingState.studySessionStart !== undefined) setStudySessionStart(incomingState.studySessionStart || null);
          if (incomingState.currentSessionSeconds !== undefined) setCurrentSessionSeconds(incomingState.currentSessionSeconds || 0);
        }
        if (incomingState.breakMinutes !== undefined) setBreakMinutes(incomingState.breakMinutes || 5);
        if (incomingState.breakEndAt !== undefined) setBreakEndAt(incomingState.breakEndAt || null);
        if (Array.isArray(incomingState.studySessions)) setStudySessions(incomingState.studySessions);
        if (Array.isArray(incomingState.highStudyRewardDates)) setHighStudyRewardDates(incomingState.highStudyRewardDates);
        if (Array.isArray(incomingState.bookList)) setBookList(incomingState.bookList);
        if (incomingState.jeeTracker && typeof incomingState.jeeTracker === "object") {
          const mergedSubjects = { ...makeDefaultJeeTrackerState().chaptersBySubject, ...(incomingState.jeeTracker.chaptersBySubject || {}) };
          const selected = JEE_SUBJECTS.includes(incomingState.jeeTracker.selectedSubject) ? incomingState.jeeTracker.selectedSubject : JEE_SUBJECTS[0];
          setJeeTracker({ selectedSubject: selected, chaptersBySubject: mergedSubjects });
        }
        if (incomingState.dailyLogsByDate && typeof incomingState.dailyLogsByDate === "object") {
          setDailyLogsByDate(incomingState.dailyLogsByDate);
          const todayKey = getStudyDayKey();
          setPendingLogs(Array.isArray(incomingState.dailyLogsByDate[todayKey]) ? incomingState.dailyLogsByDate[todayKey] : []);
        }
        if (incomingState.obsidianOwnerDeviceId !== undefined) setObsidianOwnerDeviceId(incomingState.obsidianOwnerDeviceId || "");
        if (incomingState.obsidianOwnerLabel !== undefined) setObsidianOwnerLabel(incomingState.obsidianOwnerLabel || "");
        if (incomingState.anytypeJournalUrlTemplate !== undefined) {
          setAnytypeJournalUrlTemplate(incomingState.anytypeJournalUrlTemplate || "");
          localStorage.setItem("sl_anytype_url_template", incomingState.anytypeJournalUrlTemplate || "");
        }
        if (incomingState.syncUpdatedAt !== undefined) setSyncUpdatedAt(incomingState.syncUpdatedAt || 0);
        if (incomingState.ghostData && typeof incomingState.ghostData === "object") {
          setGhostData({
            lastPromptDate: incomingState.ghostData.lastPromptDate || "",
            lastEvaluatedDate: incomingState.ghostData.lastEvaluatedDate || "",
            historyByDate: incomingState.ghostData.historyByDate || {}
          });
        }
      };

      const getFirebaseStateRef = React.useCallback((uid) => {
        if (!firebaseDb || !uid) return null;
        return firebaseDb.collection(FIREBASE_SYNC_COLLECTION).doc(uid).collection("documents").doc(FIREBASE_SYNC_DOC_ID);
      }, [firebaseDb]);

      const pullFirebaseState = React.useCallback(async (uid, showToast = false) => {
        const targetUid = uid || firebaseUser?.uid;
        const docRef = getFirebaseStateRef(targetUid);
        if (!docRef) return false;
        try {
          setFirebaseStatus("Pulling...");
          const snap = await docRef.get();
          if (!snap.exists) {
            setFirebaseStatus("Connected");
            if (showToast) addToast("No Firebase cloud state yet.", "system");
            return false;
          }
          const cloudState = snap.data()?.state;
          if (!cloudState || typeof cloudState !== "object") return false;
          firebaseApplyingRemoteRef.current = true;
          applyImportedState(cloudState);
          saveState(cloudState);
          syncUpdatedAtRef.current = Number(cloudState.syncUpdatedAt || Date.now());
          setSyncUpdatedAt(Number(cloudState.syncUpdatedAt || Date.now()));
          setFirebaseStatus("Connected");
          if (showToast) addToast("Firebase save loaded.", "system");
          return true;
        } catch (_err) {
          setFirebaseStatus("Pull failed");
          if (showToast) addToast("Firebase pull failed.", "error");
          return false;
        } finally {
          setTimeout(() => {
            firebaseApplyingRemoteRef.current = false;
          }, 0);
        }
      }, [addToast, applyImportedState, firebaseUser, getFirebaseStateRef]);

      const pushFirebaseState = React.useCallback(async (snapshot, showToast = false) => {
        if (!firebaseUser?.uid) return false;
        const docRef = getFirebaseStateRef(firebaseUser.uid);
        if (!docRef) return false;
        try {
          setFirebaseStatus("Pushing...");
          await docRef.set({
            state: snapshot,
            syncUpdatedAt: Number(snapshot?.syncUpdatedAt || Date.now()),
            updatedAt: window.firebase.firestore.FieldValue.serverTimestamp()
          }, { merge: true });
          setFirebaseStatus("Connected");
          if (showToast) addToast("Firebase save uploaded.", "system");
          return true;
        } catch (_err) {
          setFirebaseStatus("Push failed");
          if (showToast) addToast("Firebase push failed, fallback active.", "error");
          return false;
        }
      }, [addToast, firebaseUser, getFirebaseStateRef]);

      const syncManagerLoad = React.useCallback(async (showToast = false) => {
        if (firebaseIsReady && firebaseUser?.uid) {
          const pulledFirebase = await pullFirebaseState(firebaseUser.uid, showToast);
          if (pulledFirebase) return true;
        }
        if (rsConnected && rsClientRef.current) {
          return pullRemoteStorageState(showToast);
        }
        return true;
      }, [firebaseIsReady, firebaseUser, pullFirebaseState, rsConnected]);

      const syncManagerSave = React.useCallback(async (snapshot, showToast = false) => {
        saveState(snapshot);
        if (firebaseApplyingRemoteRef.current) return true;
        if (firebaseIsReady && firebaseUser?.uid) {
          const pushedFirebase = await pushFirebaseState(snapshot, showToast);
          if (pushedFirebase) return true;
        }
        if (rsConnected && rsClientRef.current) {
          return pushRemoteStorageState(snapshot, showToast);
        }
        return true;
      }, [firebaseIsReady, firebaseUser, pushFirebaseState, rsConnected]);

      const signInWithGoogle = async () => {
        if (!firebaseAuth || !window.firebase?.auth) {
          addToast("Firebase Auth is not configured yet.", "error");
          return;
        }
        try {
          const provider = new window.firebase.auth.GoogleAuthProvider();
          setFirebaseStatus("Signing in...");
          await firebaseAuth.signInWithPopup(provider);
        } catch (err) {
          setFirebaseStatus("Sign-in failed");
          addToast(err?.message || "Google sign-in failed.", "error");
        }
      };

      const signOutFirebase = async () => {
        if (!firebaseAuth) return;
        try {
          await firebaseAuth.signOut();
          addToast("Signed out from Firebase.", "system");
        } catch (err) {
          addToast(err?.message || "Firebase sign-out failed.", "error");
        }
      };

      React.useEffect(() => {
        if (!firebaseIsReady) {
          setFirebaseStatus("Not initialized");
          return;
        }
        setFirebaseStatus("Waiting for login");
        firebaseAuthUnsubscribeRef.current = firebaseAuth.onAuthStateChanged(async (user) => {
          setFirebaseUser(user || null);
          if (!user) {
            if (firebaseUnsubscribeRef.current) {
              firebaseUnsubscribeRef.current();
              firebaseUnsubscribeRef.current = null;
            }
            setFirebaseStatus("Logged out");
            return;
          }

          setFirebaseStatus("Connected");
          await syncManagerLoad(true);
          const docRef = getFirebaseStateRef(user.uid);
          if (!docRef) return;
          if (firebaseUnsubscribeRef.current) firebaseUnsubscribeRef.current();
          firebaseUnsubscribeRef.current = docRef.onSnapshot((snap) => {
            const remote = snap.data()?.state;
            if (!remote || firebaseApplyingRemoteRef.current) return;
            const remoteUpdatedAt = Number(remote.syncUpdatedAt || 0);
            const localUpdatedAt = Number(syncUpdatedAtRef.current || 0);
            if (remoteUpdatedAt > localUpdatedAt) {
              firebaseApplyingRemoteRef.current = true;
              applyImportedState(remote);
              saveState(remote);
              syncUpdatedAtRef.current = remoteUpdatedAt;
              setSyncUpdatedAt(remoteUpdatedAt);
              setTimeout(() => {
                firebaseApplyingRemoteRef.current = false;
              }, 0);
            }
          }, () => {
            setFirebaseStatus("Realtime listener error");
          });
        });

        return () => {
          if (firebaseAuthUnsubscribeRef.current) firebaseAuthUnsubscribeRef.current();
          if (firebaseUnsubscribeRef.current) firebaseUnsubscribeRef.current();
        };
      }, [applyImportedState, firebaseAuth, firebaseIsReady, getFirebaseStateRef, syncManagerLoad]);

      const pullRemoteStorageState = async (showToast = false) => {
        if (!rsClientRef.current) return false;
        if (rsPullInFlightRef.current) return false;
        rsPullInFlightRef.current = true;
        try {
          setRsStatus("Pulling...");
          const remoteState = await rsClientRef.current.getObject("state.json");
          if (remoteState && typeof remoteState === "object") {
            const remoteUpdatedAt = Number(remoteState.syncUpdatedAt || 0);
            const localSnapshot = loadState() || {};
            const localUpdatedAt = Number(localSnapshot.syncUpdatedAt || syncUpdatedAtRef.current || 0);
            if (remoteUpdatedAt >= localUpdatedAt) {
              applyImportedState(remoteState);
              const mergedState = {
                ...remoteState,
                studySessionStart,
                currentSessionSeconds
              };
              saveState(mergedState);
              syncUpdatedAtRef.current = Number(mergedState.syncUpdatedAt || 0);
              if (showToast) addToast("remoteStorage save loaded.", "system");
            } else {
              const nextSnapshot = {
                appPassword, stats, xp, gold, darkCrystals, streak, lastActivityDate, weeklyStats, lastSpin,
                quests, negativeQuests, sideMissions, raids, bosses, rivals, ranks,
                lightShop, darkShop,
                lifeMission, shortTermMission, roadmap, studyLog,
                breakMinutes, breakEndAt, studySessions, highStudyRewardDates, bookList, jeeTracker,
                dailyLogsByDate, obsidianOwnerDeviceId, obsidianOwnerLabel, anytypeJournalUrlTemplate, ghostData,
                studySessionStart, currentSessionSeconds,
                syncUpdatedAt: Date.now()
              };
              setSyncUpdatedAt(nextSnapshot.syncUpdatedAt);
              saveState(nextSnapshot);
              syncUpdatedAtRef.current = Number(nextSnapshot.syncUpdatedAt || 0);
              await pushRemoteStorageState(nextSnapshot, false);
              if (showToast) addToast("Local save was newer. Uploaded local state to remoteStorage.", "system");
            }
          } else if (showToast) {
            addToast("No remoteStorage state found yet.", "system");
          }
          setRsStatus("Connected");
          return true;
        } catch (err) {
          setRsStatus("Pull failed");
          if (showToast) addToast("remoteStorage pull failed.", "error");
          return false;
        } finally {
          rsPullInFlightRef.current = false;
        }
      };

      const pushRemoteStorageState = async (snapshot, showToast = false) => {
        if (!rsClientRef.current) return false;
        if (rsPushInFlightRef.current) return false;
        rsPushInFlightRef.current = true;
        try {
          setRsStatus("Pushing...");
          await rsClientRef.current.storeObject("sl-state", "state.json", snapshot);
          if (rsRef.current?.startSync) {
            try { await rsRef.current.startSync(); } catch (_e) {}
          }
          setRsStatus("Connected");
          if (showToast) addToast("remoteStorage save uploaded.", "system");
          return true;
        } catch (err) {
          setRsStatus("Push failed");
          if (showToast) addToast("remoteStorage push failed.", "error");
          return false;
        } finally {
          rsPushInFlightRef.current = false;
        }
      };

      const buildSyncSnapshot = (updatedAt = Date.now()) => ({
        appPassword, stats, xp, gold, darkCrystals, streak, lastActivityDate, weeklyStats, lastSpin,
        quests, negativeQuests, sideMissions, raids, bosses, rivals, ranks,
        lightShop, darkShop,
        lifeMission, shortTermMission, roadmap, studyLog,
        breakMinutes, breakEndAt, studySessions, highStudyRewardDates, bookList, jeeTracker,
        dailyLogsByDate,
        obsidianOwnerDeviceId, obsidianOwnerLabel, anytypeJournalUrlTemplate, ghostData,
        studySessionStart, currentSessionSeconds,
        syncUpdatedAt: updatedAt
      });

      // Save Hook
      React.useEffect(() => {
        if (isUnlocked) {
          const nextSyncUpdatedAt = Date.now();
          const snapshot = buildSyncSnapshot(nextSyncUpdatedAt);
          setSyncUpdatedAt(nextSyncUpdatedAt);
          syncUpdatedAtRef.current = Number(nextSyncUpdatedAt || 0);
          syncManagerSave(snapshot, false);

        }
      },[isUnlocked, appPassword, stats, xp, gold, darkCrystals, streak, lastActivityDate, weeklyStats, lastSpin, quests, negativeQuests, sideMissions, raids, bosses, rivals, ranks, lightShop, darkShop, lifeMission, shortTermMission, roadmap, studyLog, breakMinutes, breakEndAt, studySessions, highStudyRewardDates, bookList, jeeTracker, dailyLogsByDate, obsidianOwnerDeviceId, obsidianOwnerLabel, anytypeJournalUrlTemplate, ghostData, syncManagerSave]);

      React.useEffect(() => {
        if (!rsConnected || !rsClientRef.current || !isUnlocked) return;
        if (rsAutoSyncTimeoutRef.current) clearTimeout(rsAutoSyncTimeoutRef.current);
        rsAutoSyncTimeoutRef.current = setTimeout(() => {
          const latest = loadState() || buildSyncSnapshot(syncUpdatedAtRef.current || Date.now());
          pushRemoteStorageState(latest, false);
        }, 900);
      }, [rsConnected, isUnlocked, syncUpdatedAt]);

      React.useEffect(() => {
        if (!rsReady || rsConnected || rsAutoConnectAttemptedRef.current) return;
        const savedAddress = (localStorage.getItem(RS_ADDRESS_KEY) || "").trim().toLowerCase();
        if (!savedAddress || !savedAddress.includes("@")) return;
        rsAutoConnectAttemptedRef.current = true;
        setRsAddress(savedAddress);
        setRsStatus("Saved remoteStorage account loaded. Connect manually when needed.");
      }, [rsReady, rsConnected]);

      React.useEffect(() => {
        return () => {
          if (rsConnectTimeoutRef.current) clearTimeout(rsConnectTimeoutRef.current);
          if (rsAutoSyncTimeoutRef.current) clearTimeout(rsAutoSyncTimeoutRef.current);
        };
      }, []);

      // Streak System
      const getStreakMultiplier = React.useCallback(() => {
        if (streak >= 30) return 2.0;
        if (streak >= 21) return 1.8;
        if (streak >= 14) return 1.6;
        if (streak >= 7) return 1.4;
        if (streak >= 3) return 1.2;
        return 1.0;
      }, [streak]);

      const getWeekStart = (date = new Date()) => {
        const d = new Date(date);
        const day = d.getDay();
        d.setDate(d.getDate() - day);
        d.setHours(0, 0, 0, 0);
        return d.toISOString().split('T')[0];
      };

      const updateStreak = React.useCallback(() => {
        const today = getStudyDayKey();
        const yesterday = getStudyDayKey(new Date(Date.now() - 86400000));
        
        if (lastActivityDate === today) {
          return streak;
        }
        
        let newStreak = streak;
        if (lastActivityDate === yesterday) {
          newStreak = streak + 1;
        } else if (lastActivityDate !== today) {
          newStreak = 1;
        }
        
        setStreak(newStreak);
        setLastActivityDate(today);
        return newStreak;
      }, [streak, lastActivityDate]);

      const getMonthKey = (dateStr) => dateStr.substring(0, 7);
      const getWeekOfMonth = (dateStr) => {
        const date = new Date(dateStr);
        const firstDayOfMonth = new Date(date.getFullYear(), date.getMonth(), 1);
        const dayOfMonth = date.getDate();
        const firstDayWeekday = firstDayOfMonth.getDay();
        return Math.ceil((dayOfMonth + firstDayWeekday) / 7);
      };
      const getCurrentWeekKey = () => `Week ${getWeekOfMonth(getStudyDayKey())}`;
      const getCurrentMonthKey = () => getMonthKey(getStudyDayKey());

      const updateWeeklyStats = React.useCallback((type, value = null) => {
        const today = getStudyDayKey();
        const monthKey = getMonthKey(today);
        const weekNum = getWeekOfMonth(today);
        const weekKey = `Week ${weekNum}`;
        
        setWeeklyStats(prev => {
          const updated = { ...(prev || {}) };
          // Migrate old format
          if (!updated.logsByMonth && updated.logsByDay) {
            const oldLogs = updated.logsByDay || {};
            updated.logsByMonth = {};
            const mKey = getMonthKey(today);
            const wKey = `Week ${getWeekOfMonth(today)}`;
            updated.logsByMonth[mKey] = {
              logsByWeek: { [wKey]: { logsByDay: oldLogs, distractions: updated.distractions || 0, negativeQuests: updated.negativeQuests || 0, totalEfficiency: updated.totalEfficiency || 0, efficiencyCount: updated.efficiencyCount || 0, weekStart: updated.weekStart || null } },
              totalDistractions: updated.distractions || 0,
              totalNegativeQuests: updated.negativeQuests || 0,
              totalEfficiency: updated.totalEfficiency || 0,
              efficiencyCount: updated.efficiencyCount || 0
            };
            delete updated.logsByDay; delete updated.weekStart; delete updated.distractions; delete updated.negativeQuests; delete updated.totalEfficiency; delete updated.efficiencyCount;
          }
          if (!updated.logsByMonth) updated.logsByMonth = {};
          if (!updated.logsByMonth[monthKey]) {
            updated.logsByMonth[monthKey] = {
              logsByWeek: {},
              totalDistractions: 0,
              totalNegativeQuests: 0,
              totalEfficiency: 0,
              efficiencyCount: 0
            };
          }
          const month = updated.logsByMonth[monthKey];
          if (!month.logsByWeek[weekKey]) {
            month.logsByWeek[weekKey] = {
              logsByDay: {},
              distractions: 0,
              negativeQuests: 0,
              totalEfficiency: 0,
              efficiencyCount: 0,
              weekStart: getWeekStart()
            };
          }
          const week = month.logsByWeek[weekKey];
          
          if (type === 'distraction') {
            week.distractions = (week.distractions || 0) + 1;
            month.totalDistractions = (month.totalDistractions || 0) + 1;
          }
          if (type === 'negativeQuest') {
            week.negativeQuests = (week.negativeQuests || 0) + 1;
            month.totalNegativeQuests = (month.totalNegativeQuests || 0) + 1;
          }
          if (type === 'efficiency' && value !== null) {
            week.totalEfficiency = (week.totalEfficiency || 0) + value;
            week.efficiencyCount = (week.efficiencyCount || 0) + 1;
            month.totalEfficiency = (month.totalEfficiency || 0) + value;
            month.efficiencyCount = (month.efficiencyCount || 0) + 1;
          }
          if (type === 'log' && value) {
            if (!week.logsByDay[today]) week.logsByDay[today] = [];
            week.logsByDay[today] = [...week.logsByDay[today], value];
          }
          return updated;
        });
      }, []);

      const getAverageEfficiency = React.useCallback((monthKey, weekKey) => {
        const month = weeklyStats?.logsByMonth?.[monthKey];
        if (!month) return 0;
        if (weekKey) {
          const week = month.logsByWeek?.[weekKey];
          if (!week?.efficiencyCount) return 0;
          return Math.round((week.totalEfficiency / week.efficiencyCount) * 10) / 10;
        }
        if (!month.efficiencyCount) return 0;
        return Math.round((month.totalEfficiency / month.efficiencyCount) * 10) / 10;
      }, [weeklyStats]);

      // --- Actions & Helpers ---
      function addToast(msg, type = 'system') {
        try {
          const Ctx = window.AudioContext || window.webkitAudioContext;
          if (Ctx) {
            const ctx = new Ctx({ latencyHint: 'interactive' });
            const o1 = ctx.createOscillator();
            const g1 = ctx.createGain();
            o1.type = 'triangle';
            o1.frequency.setValueAtTime(1046, ctx.currentTime);
            g1.gain.setValueAtTime(0.0001, ctx.currentTime);
            g1.gain.exponentialRampToValueAtTime(0.18, ctx.currentTime + 0.015);

        const minutes = Math.max(0, Number(manualStudyMinutes) || 0);
        const totalSec = Math.floor(hours * 3600 + minutes * 60);
        if (totalSec <= 0) {
          addToast("Enter valid manual time first.", "error");
          return;
        }
        const sessionDate = getStudyDayKey();
        const multiplier = getStreakMultiplier();
        const sessionHours = totalSec / 3600;
        const xpGain = Math.floor(Math.max(0, Math.floor(sessionHours * 20)) * multiplier);
        const goldGain = Math.floor(Math.max(0, Math.floor(sessionHours * 8)) * multiplier);
        const manualSession = {
          id: Date.now(),
          start: null,
          end: new Date().toISOString(),
          durationSec: totalSec,
          date: sessionDate,
          isManual: true
        };
        setStudySessions(prev => [...prev, manualSession]);
        if (xpGain > 0) setXP(v => v + xpGain);
        if (goldGain > 0) setGold(v => v + goldGain);
        updateWeeklyStats('log', `⏱ Manual Study: ${formatDuration(totalSec)}`);
        writeToDailyNote(`- [Study Session] ⏱ Manual add ${formatDuration(totalSec)} | +${xpGain} XP (x${multiplier}), +${goldGain} Gold`, { skipCloudSync: true });
        addToast(`Manual time added: ${formatDuration(totalSec)} • +${xpGain} XP • +${goldGain}G`, "loot");
        setManualStudyHours("");
        setManualStudyMinutes("");
      };

      const stopStudySessionAndOpenTimer = () => {
        stopStudySession();
        setActiveCategory("Eclipse");
        setGrindTab("Timer");
        setIsTimerPoppedOut(false);
        if (desktopTimerBridge?.closeMini) desktopTimerBridge.closeMini();
      };
      startStudySessionRef.current = startStudySession;
      stopStudySessionRef.current = stopStudySession;
      stopStudySessionAndOpenTimerRef.current = stopStudySessionAndOpenTimer;

      const beginTimerWidgetDrag = (event) => {
        const point = event.touches ? event.touches[0] : event;
        timerDragOffsetRef.current = {
          x: point.clientX - timerWidgetPos.x,
          y: point.clientY - timerWidgetPos.y
        };
        setIsTimerDragging(true);
      };

      const startBreakTimer = () => {
        const mins = Math.max(1, Math.min(120, Number(breakMinutes) || 5));
        setBreakMinutes(mins);
        const endAt = new Date(Date.now() + mins * 60 * 1000).toISOString();
        setBreakEndAt(endAt);
        addToast(`Break timer started for ${mins} minute(s).`, "system");
      };

      // --- Anytype Journal Sync (in-app + remoteStorage) ---
      const linkVaultFolder = async () => {
          if (!isObsidianOwner) {
              addToast(`Anytype logging is locked by ${obsidianOwnerLabel || obsidianOwnerDeviceId}.`, "error");
              return;
          }
          if (!obsidianOwnerDeviceId) {
              setObsidianOwnerDeviceId(deviceId);
              setObsidianOwnerLabel(deviceLabel);
          }
          setVaultLinkedName("Anytype Cloud Journal");
          addToast("✅ Anytype journal logging enabled (no folder selection needed).", "system");
      };

      const unlinkVaultFolder = async () => {
          if (!isObsidianOwner) {
              addToast("Only the linked owner device can unlink Anytype sync.", "error");
              return;
          }
          setVaultLinkedName("");
          setObsidianOwnerDeviceId("");
          setObsidianOwnerLabel("");
          setDailyLogsByDate({});
          setPendingLogs([]);
          addToast("Anytype journal sync disabled for this save.", "system");
      };

      const writeToDailyNote = async (content, options = {}) => {
          const { skipCloudSync = false } = options;
          if (!isObsidianOwner) {
              addToast(`Anytype log locked to ${obsidianOwnerLabel || obsidianOwnerDeviceId}.`, "error");
              return false;
          }
          try {
              // Avoid pulling cloud state right after local timer/quest mutations,
              // otherwise a stale remote snapshot can overwrite fresh local progress.
              if (!skipCloudSync) {
                await syncBeforeJournalEdit(false);
              }
              const dateStr = getStudyDayKey();
              // Always write locally first so logs are never lost when cloud pull fails.
              const existing = Array.isArray(dailyLogsByDate[dateStr]) ? dailyLogsByDate[dateStr] : [];
              const dedupe = new Set(existing);
              dedupe.add(content);
              const next = Array.from(dedupe);
              setDailyLogsByDate(prev => ({ ...prev, [dateStr]: next }));
              setPendingLogs(next);
              addToast("📝 Entry logged.", "system");
              return true;
          } catch (e) {
              console.error(e);
              addToast("❌ Failed to save Anytype journal entry.", "error");
              return false;
          }
      };

      const [dailyLogModal, setDailyLogModal] = React.useState(null);

      const openDailyNote = async () => {
          if (!isObsidianOwner) {
              addToast(`Open logs on owner device: ${obsidianOwnerLabel || obsidianOwnerDeviceId}.`, "error");
              return;
          }
          try {
              const synced = await syncBeforeJournalEdit(true);
              if (!synced) return;
              const dateStr = getStudyDayKey();
              const todayLogs = Array.isArray(dailyLogsByDate[dateStr]) ? dailyLogsByDate[dateStr] : [];
              if (todayLogs.length === 0) {
                setDailyLogModal("(No entries yet for today.)");
              } else {
                setPendingLogs(todayLogs);
                setDailyLogModal(todayLogs.join('\n'));
              }
              const anytypeUrl = buildAnytypeJournalUrl();
              if (anytypeUrl) window.open(anytypeUrl, '_blank');
          } catch(e) {
              console.error(e);
              addToast("❌ Failed to open daily log.", "error");
          }
      };

      const currentLevel = calcLevel(xp);
      const currentRank =[...ranks].reverse().find(r => xp >= r.xp) || ranks[0];
      const currentRankIdx = rankOrder.indexOf(currentRank.tier);

      // --- GACHA LOGIC ---
      const canSpin = !lastSpin || (new Date().setHours(0,0,0,0) > new Date(lastSpin).setHours(0,0,0,0));
      
      const gachaPool =[
        { label: "JACKPOT", sub: "+500 XP, +100 Gold", color: "gold", act: () => { setXP(x=>x+500); setGold(g=>g+100); addToast("🎰 JACKPOT! +500 XP, +100 Gold", "loot"); } },
        { label: "EPIC LOOT", sub: "+200 XP", color: "purple", act: () => { setXP(x=>x+200); addToast("Loot Acquired: +200 XP", "loot"); } },
        { label: "BOUNTY", sub: "+50 Gold", color: "blue", act: () => { setGold(g=>g+50); addToast("Loot Acquired: +50 Gold", "loot"); } },
        { label: "AWAKENING", sub: "+2 Focus", color: "green", act: () => { setStats(s=>({...s, Focus: s.Focus+2})); addToast("Stat Improved: +2 Focus", "system"); } },
        { label: "GLITCH", sub: "+5 DC", color: "red", act: () => { setDarkCrystals(d=>d+5); addToast("System Glitch! Dark Energy Absorbed (+5 DC)", "penalty"); } },
        { label: "BLESSING", sub: "+100 XP, +20 Gold", color: "purple", act: () => { setXP(x=>x+100); setGold(g=>g+20); addToast("System Blessing Received!", "loot"); } }
      ];

      const handleGachaSpin = () => {
        if(!canSpin || isSpinning) return;
        setIsSpinning(true);
        
        const newItems = Array.from({length: 50}, () => gachaPool[Math.floor(Math.random() * gachaPool.length)]);
        const winningIndex = 44;
        const winner = gachaPool[Math.floor(Math.random() * gachaPool.length)];
        newItems[winningIndex] = winner;
        
        setGachaItems(newItems);
        setGachaOffset(0);

        setTimeout(() => {
          const itemWidth = 150; 
          const fuzz = Math.floor(Math.random() * 80) - 40;
          setGachaOffset(`calc(50% - 75px - ${winningIndex * itemWidth}px + ${fuzz}px)`);
        }, 50);

        setTimeout(() => {
          setIsSpinning(false);
          setLastSpin(Date.now());
          winner.act();
          setTimeout(() => toggleModal('spin', false), 2500);
        }, 5500);
      };

      // --- Renders ---
      if (!isUnlocked) {
        return (
          <div className="min-h-screen flex items-center justify-center bg-[#0f1115]">
            <div className="sl-glass p-8 text-center max-w-sm w-full shadow-[0_0_50px_#a259ff33]">
              <h1 className="text-3xl font-black glow-purple mb-6 uppercase tracking-widest">System Locked</h1>
              <p className="text-gray-400 mb-6 text-sm">Enter Hunter Identification Sequence.</p>
              <input type="password" placeholder="Password" className="sl-modal-input text-center font-bold tracking-widest" value={loginInput} onChange={e=>setLoginInput(e.target.value)} onKeyDown={e=>{if(e.key==='Enter') { if(loginInput === appPassword || !appPassword) setIsUnlocked(true); else addToast("❌ Access Denied", "error"); }}} />
              <button className="sl-btn w-full py-3 mt-2" onClick={() => { if(loginInput === appPassword || !appPassword) { setIsUnlocked(true); addToast("Welcome back, Player.", "system"); } else addToast("❌ Access Denied", "error"); }}>Awaken</button>
            </div>
            <div className="toast-container">
              {toasts.map(t => <div key={t.id} className={`toast-item ${t.type}`}>{t.msg}</div>)}
            </div>
          </div>
        );
      }

      return (
        <div className="sl-panel p-4 md:p-6 pb-20">
          
          <div className="toast-container">
            {toasts.map(t => (
              <div key={t.id} className={`toast-item ${t.type}`}>
                {t.type === 'loot' && '✨ '}
                {t.type === 'penalty' && '⚠️ '}
                {t.type === 'error' && '❌ '}
                {t.type === 'system' && '📜 '}
                {t.type === 'combat' && '⚔️ '}
                {t.msg}
              </div>
            ))}
          </div>

          <div className="w-full max-w-6xl mx-auto mb-6">
            <div className="bg-[#14161c] border border-purple-500/30 rounded-xl px-3 py-2 flex flex-wrap items-center gap-2 shadow-[0_0_20px_#a259ff22]">
              <button className="sl-btn px-4 py-1.5 text-sm uppercase tracking-wider" onClick={() => setGhostModalOpen(true)} title="Ghost - 1% Better Daily">
                👻 Ghost
              </button>
              <button className={`sl-btn px-4 py-1.5 text-sm uppercase ${!canSpin ? 'opacity-40 grayscale' : 'animate-pulse shadow-[0_0_15px_#a259ff]'}`} onClick={() => { setGachaItems(Array(5).fill({label:"?", color:"blue"})); setGachaOffset(0); toggleModal('spin', true); }} disabled={!canSpin}>
                🎡 Gacha {canSpin ? '(Ready)' : '(Cooldown)'}
              </button>
              <div className="bg-[#1a1c23] px-4 py-1.5 rounded-full border border-[#ecc94b55] flex items-center gap-2 shadow-lg">
                <span className="font-bold glow-gold text-sm">🔥 {streak} Days (x{getStreakMultiplier()})</span>
              </div>
              <button className="sl-btn px-3 py-1.5 text-sm uppercase" onClick={() => toggleModal('weekly', true)} title="Hunter Archive">
                ℹ️ Archive
              </button>
            </div>
          </div>

          <div className="w-full flex flex-col lg:flex-row gap-6 max-w-6xl mx-auto">
            {/* Sidebar */}
            <div className="w-full lg:w-1/4 sl-glass p-6 flex flex-col items-center self-start relative">
              <div className="w-24 h-24 rounded-full bg-gradient-to-br from-gray-800 to-gray-900 border-2 border-purple-500 flex items-center justify-center mb-4 shadow-[0_0_20px_#a259ff66]">
                <span className="text-4xl sl-status-label font-black drop-shadow-md">{currentRank.tier}</span>
              </div>
              <div className="text-center mb-4">
                <div className="text-xl glow-gold font-bold uppercase tracking-wider">{currentRank.name}</div>
                <div className="text-gray-400 text-sm font-bold">Level {currentLevel}</div>
              </div>
              
              <div className="w-full mb-6">
                <div className="xp-bar-bg">
                  <div className="xp-bar-fill" style={{ width: `${Math.min(100, ((xp - currentRank.xp) / ((ranks[currentRankIdx+1]?.xp || xp+1) - currentRank.xp)) * 100)}%` }}></div>
                  <div className="xp-bar-label">{xp} XP</div>
                </div>
              </div>
              
              <div className="grid grid-cols-2 gap-3 w-full mb-6">
                {Object.keys(stats).map(stat => (
                  <div key={stat} className="bg-[#1a1c23] p-2 rounded border border-gray-700 flex justify-between items-center shadow-inner">
                    <span className="text-purple-400 text-xs font-bold uppercase">{stat}</span><span className="text-white text-sm font-bold">{stats[stat]}</span>
                  </div>
                ))}
              </div>
              
              <div className="flex w-full gap-2">
                <div className="flex-1 bg-gradient-to-br from-yellow-900/30 to-yellow-600/10 border border-yellow-600/30 py-2 rounded text-center shadow-[0_0_10px_#ecc94b22]">
                  <div className="text-[10px] text-yellow-600 uppercase font-black">Gold</div>
                  <div className="text-lg glow-gold font-black">{gold}</div>
                </div>
                <div className="flex-1 bg-gradient-to-br from-red-900/30 to-red-600/10 border border-red-600/30 py-2 rounded text-center shadow-[0_0_10px_#e53e3e22]">
                  <div className="text-[10px] text-red-600 uppercase font-black">Dark Crystals</div>
                  <div className="text-lg glow-red font-black">{darkCrystals}</div>
                </div>
              </div>
            </div>

            {/* Dashboard */}
            <div className="flex-1 min-w-0 flex flex-col gap-4">
              
              <div className="flex gap-2 bg-[#1a1c23] p-1.5 rounded-lg border border-purple-500/30 overflow-x-auto shadow-lg">
                {["System", "Combat", "Journey", "Hub", "Eclipse"].map(cat => (
                  <button key={cat} className={`sl-category-btn whitespace-nowrap ${activeCategory === cat ? "sl-category-btn-active" : ""}`} onClick={() => setActiveCategory(cat)}>
                    {cat === "System" ? "📜 System" : cat === "Combat" ? "⚔️ Combat" : cat === "Journey" ? "🗺️ Journey" : cat === "Hub" ? "⛺ Hub" : "🌘 Eclipse"}
                  </button>
                ))}
              </div>
              
              <div className="sl-glass p-5 md:p-8 flex-1 min-h-[500px]">

                {/* 1. SYSTEM */}
                {activeCategory === "System" && (
                  <div className="fade-in">
                    <div className="flex gap-6 mb-6 border-b border-gray-700 pb-2 overflow-x-auto">
                      {["Quests", "Evaluation", "Efficiency", "Negative Quests", "Study Log"].map(tab => (
                        <button key={tab} className={`sl-tab whitespace-nowrap ${systemTab === tab ? "sl-tab-active" : ""}`} onClick={() => setSystemTab(tab)}>{tab}</button>
                      ))}
                    </div>

                    {systemTab === "Quests" && (
                      <div>
                        <div className="flex justify-between items-center mb-4">
                          <h3 className="font-bold text-lg glow-purple uppercase tracking-widest">Daily Directives</h3>
                          <button className="sl-btn px-4 py-1.5 text-xs" onClick={() => toggleModal('quest', true)}>+ ADD QUEST</button>
                        </div>
                        <div className="space-y-3">
                          {quests.map((q, i) => (
                            <div key={q.id} className={`flex justify-between items-center rounded-lg p-4 border ${q.done ? "opacity-40 bg-[#1a1c23] border-gray-700" : (q.isPenalty ? "bg-red-900/10 border-red-500 pulse-red" : "bg-[#1a1c23] border-purple-500/50 hover:border-purple-400 transition-colors shadow-lg")}`}>
                              <div>
                                <div className="flex items-center gap-2">
                                    <div className={`font-bold text-lg ${q.isPenalty ? "text-red-400 drop-shadow-[0_0_5px_#e53e3e]" : "text-white"}`}>{q.isPenalty ? "⚠️ MANDATORY PENALTY: " : ""}{q.name}</div>
                                    {q.repeatable && <span className="text-[10px] bg-purple-900/50 text-purple-300 px-2 py-0.5 rounded border border-purple-500/30 uppercase">Repeatable</span>}
                                </div>
                                <div className="text-xs text-gray-400 mt-1">{q.isPenalty ? `Requires immediate resolution.` : `Reward: +${q.statInc} ${q.stat} • ${q.xp} XP • ${q.gold} Gold`}</div>
                              </div>
                              <div className="flex gap-3">
                                {!q.done && <button className={`sl-btn px-4 py-1.5 text-sm ${q.isPenalty ? 'bg-gradient-to-r from-red-600 to-red-800 shadow-[0_0_10px_#e53e3e55]' : ''}`} onClick={() => completeQuest(i)}>{q.isPenalty ? 'Endure' : (q.repeatable ? 'Complete' : 'Done')}</button>}
                                <button className="text-gray-600 hover:text-red-500 transition-colors" onClick={() => {
                                   if(q.isPenalty && !q.done) { addToast("Cannot delete a Mandatory Penalty. You must endure it.", "error"); return; }
                                   setQuests(qs => qs.filter((_, idx) => idx !== i));
                                }}>🗑️</button>
                              </div>
                            </div>
                          ))}
                          {quests.length === 0 && <div className="text-center text-gray-500 py-8 border border-dashed border-gray-700 rounded-lg">No active quests. The System waits.</div>}
                        </div>
                      </div>
                    )}

                    {systemTab === "Negative Quests" && (
                      <div className="fade-in">
                        <div className="flex justify-between items-center mb-4">
                          <h3 className="font-bold text-lg text-red-500 uppercase tracking-widest drop-shadow-[0_0_5px_#e53e3e]">Dark Directives</h3>
                          <button className="sl-btn px-4 py-1.5 text-xs bg-gradient-to-r from-red-700 to-red-900 shadow-[0_0_10px_#e53e3e55]" onClick={() => toggleModal('darkQuest', true)}>+ ADD DARK QUEST</button>
                        </div>
                        <p className="text-sm text-gray-400 mb-6">These represent bad habits. Indulging in them will reduce your stats and XP, but will grant Dark Crystals representing systemic corruption.</p>
                        <div className="space-y-3">
                          {negativeQuests.map((q, i) => (
                            <div key={q.id} className="flex justify-between items-center rounded-lg p-4 border bg-red-900/10 border-red-500/50 shadow-[0_0_15px_#e53e3e22]">
                              <div>
                                <div className="font-bold text-lg text-red-400">{q.name}</div>
                                <div className="text-xs text-gray-400 mt-1">
                                  Consequence: {((Array.isArray(q.statDrains) && q.statDrains.length > 0) ? q.statDrains : [{ stat: q.stat, amount: q.statDec }]).map((d) => `-${d.amount} ${d.stat}`).join(" • ")} • -{q.xpDec} XP • <span className="text-red-500 font-bold">+{q.dcInc} DC</span>
                                </div>
                              </div>
                              <div className="flex gap-3">
                                <button className="bg-red-800 text-white px-4 py-1.5 rounded font-bold uppercase text-sm hover:bg-red-700 shadow-md" onClick={() => indulgeNegativeQuest(i)}>Indulge</button>
                                <button className="text-gray-600 hover:text-red-500 transition-colors" onClick={() => setNegativeQuests(qs => qs.filter((_, idx) => idx !== i))}>🗑️</button>
                              </div>
                            </div>
                          ))}
                          {negativeQuests.length === 0 && <div className="text-center text-gray-500 py-8 border border-dashed border-red-900 rounded-lg">No dark directives set. Keep your path pure.</div>}
                        </div>
                      </div>
                    )}

                    {systemTab === "Evaluation" && (
                      <div className="max-w-md mx-auto fade-in">
                         <div className="text-center mb-6">
                           <h3 className="text-2xl font-black text-red-500 mb-2 uppercase drop-shadow-[0_0_10px_#e53e3e]">Distraction Confession</h3>
                           <p className="text-sm text-gray-400">Confess sins against productivity. Generates a Mandatory Penalty Quest. Auto-logs into the Anytype sync timeline.</p>
                         </div>
                         <div className="bg-[#1a1c23] p-6 rounded-xl border border-red-500/50 shadow-[0_0_25px_rgba(229,62,62,0.15)] flex flex-col gap-4">
                            <div><label className="sl-modal-label text-red-400">Distraction Source</label><input type="text" id="dName" className="sl-modal-input border-red-900/50 focus:border-red-500" placeholder="e.g. YouTube Doomscrolling" /></div>
                            <div className="flex gap-4">
                                <div className="flex-1"><label className="sl-modal-label text-red-400">Hours Wasted</label><input type="number" step="0.5" id="dTime" className="sl-modal-input border-red-900/50 focus:border-red-500" placeholder="1.5" /></div>
                                <div className="flex-1"><label className="sl-modal-label text-red-400">DC Penalty</label><input type="number" id="dDC" className="sl-modal-input border-red-900/50 focus:border-red-500" placeholder="10" /></div>
                            </div>
                            <div><label className="sl-modal-label text-red-400">Self-Imposed Consequence</label><input type="text" id="dCons" className="sl-modal-input border-red-900/50 focus:border-red-500" placeholder="e.g. 50 pushups immediately" /></div>
                            
                            <button className="bg-gradient-to-r from-red-600 to-red-900 text-white font-bold py-3 rounded uppercase tracking-wider mt-2 hover:filter hover:brightness-110 shadow-[0_0_15px_#e53e3e55]" onClick={async () => {
                              const dn=document.getElementById('dName').value, dt=parseFloat(document.getElementById('dTime').value), dc=document.getElementById('dCons').value, dcManual=parseInt(document.getElementById('dDC').value);
                              if(!dn || isNaN(dt) || !dc) { addToast("System Warning: Fill required confession fields.", "error"); return; }
                              
                              const dcGained = isNaN(dcManual) ? Math.ceil(dt*3) : dcManual;
                              const nq = { id: Date.now(), name: `${dc} (For: ${dn})`, stat: "Consistency", statInc: 1, xp: 0, gold: 0, done: false, isPenalty: true, repeatable: false };
                              setQuests(qs =>[nq, ...qs]); 
                              setDarkCrystals(d => d + dcGained);
                              updateWeeklyStats('distraction');
                              updateWeeklyStats('log', `😵 Distraction: ${dn} (${dt}h)`);
                              
                              const logEntry = `-[Distraction Confession] Wasted ${dt}h on ${dn}. Penalty: ${dc}. +${dcGained} Dark Crystals.`;
                              
                              await writeToDailyNote(logEntry);
                              
                              document.getElementById('dName').value=''; document.getElementById('dTime').value=''; document.getElementById('dCons').value=''; document.getElementById('dDC').value='';
                            }}>Submit Confession</button>
                         </div>
                      </div>
                    )}

                    {systemTab === "Efficiency" && (
                      <div className="max-w-md mx-auto fade-in text-center">
                        <h3 className="text-2xl font-black glow-purple mb-2 uppercase tracking-widest">Temporal Assessment</h3>
                        <p className="text-sm text-gray-400 mb-6">Evaluate your daily Hunter efficiency. Low efficiency angers the System.</p>
                        
                        <div className="bg-[#1a1c23] p-6 rounded-xl border border-purple-500/50 shadow-[0_0_20px_#a259ff22] flex flex-col gap-4 text-left">
                           <div><label className="sl-modal-label">Total Work Hours Available</label><input type="number" id="effTotal" className="sl-modal-input" placeholder="8" /></div>
                           <div><label className="sl-modal-label">Actual Focused Hours</label><input type="number" id="effFocus" className="sl-modal-input" placeholder="6" /></div>
                           <button className="sl-btn py-3 mt-2 uppercase tracking-widest text-sm" onClick={()=>{
                             const t = parseFloat(document.getElementById('effTotal').value);
                             const f = parseFloat(document.getElementById('effFocus').value);
                             if(!t || f===undefined || t<=0) { addToast("Invalid input detected.", "error"); return; }
                             const pct = Math.round((f/t)*100);
                             updateWeeklyStats('efficiency', pct);
                             updateStreak();
                             const multiplier = getStreakMultiplier();
                             if(pct >= 95) {
                               const xpGain = Math.floor(300 * multiplier);
                               const goldGain = Math.floor(100 * multiplier);
                               setXP(x=>x+xpGain); setGold(g=>g+goldGain); setStats(s=>({...s, Focus: s.Focus+3})); 
                               updateWeeklyStats('log', `🌟 Efficiency: ${pct}%`);
                               addToast(`🌟 SOVEREIGN Efficiency (${pct}%)! +${xpGain} XP, +${goldGain} Gold, +3 Focus (x${multiplier})`, "loot");
                               writeToDailyNote(`- [Efficiency] 🌟 SOVEREIGN — ${pct}% (${f}h / ${t}h) | +${xpGain} XP, +${goldGain} Gold, +3 Focus`);
                             } else if(pct >= 80) {
                               const xpGain = Math.floor(150 * multiplier);
                               const goldGain = Math.floor(50 * multiplier);
                               setXP(x=>x+xpGain); setGold(g=>g+goldGain); setStats(s=>({...s, Focus: s.Focus+1})); 
                               updateWeeklyStats('log', `⚡ Efficiency: ${pct}%`);
                               addToast(`⚡ S-Rank Efficiency (${pct}%)! +${xpGain} XP, +${goldGain} Gold, +1 Focus (x${multiplier})`, "loot");
                               writeToDailyNote(`- [Efficiency] ⚡ S-Rank — ${pct}% (${f}h / ${t}h) | +${xpGain} XP, +${goldGain} Gold, +1 Focus`);
                             } else if(pct >= 70) {
                               const xpGain = Math.floor(90 * multiplier);
                               const goldGain = Math.floor(25 * multiplier);
                               setXP(x=>x+xpGain); setGold(g=>g+goldGain); 
                               updateWeeklyStats('log', `✅ Efficiency: ${pct}%`);
                               addToast(`✅ A-Rank Efficiency (${pct}%)! +${xpGain} XP, +${goldGain} Gold (x${multiplier})`, "system");
                               writeToDailyNote(`- [Efficiency] ✅ A-Rank — ${pct}% (${f}h / ${t}h) | +${xpGain} XP, +${goldGain} Gold`);
                             } else if(pct >= 60) {
                               const xpGain = Math.floor(40 * multiplier);
                               setXP(x=>x+xpGain); 
                               updateWeeklyStats('log', `📋 Efficiency: ${pct}%`);
                               addToast(`📋 B-Rank Efficiency (${pct}%)! +${xpGain} XP (x${multiplier}).`, "system");
                               writeToDailyNote(`- [Efficiency] 📋 B-Rank — ${pct}% (${f}h / ${t}h) | +${xpGain} XP`);
                             } else if(pct >= 40) {
                               const dc = Math.round(15 + (59 - pct) * 0.5);
                               setDarkCrystals(d=>d+dc);
                               setQuests(qs=>[{id:Date.now(), name:"Efficiency Repair (Study 1hr extra)", stat:"Focus", statInc:1, xp:0, gold:0, done:false, isPenalty:true, repeatable: false}, ...qs]);
                               updateWeeklyStats('log', `⚠️ Efficiency: ${pct}%`);
                               addToast(`⚠️ D-Rank Efficiency (${pct}%). Penalty! +${dc} DC`, "penalty");
                               writeToDailyNote(`- [Efficiency] ⚠️ D-Rank — ${pct}% (${f}h / ${t}h) | PENALTY +${dc} DC`);
                             } else {
                               const dc = Math.round(30 + (39 - pct) * 1.2);
                               setDarkCrystals(d=>d+dc);
                               setXP(x=>Math.max(0, x-30));
                               setQuests(qs=>[{id:Date.now(), name:"Emergency Efficiency Restoration (2hrs deep work)", stat:"Focus", statInc:2, xp:0, gold:0, done:false, isPenalty:true, repeatable: false}, ...qs]);
                               updateWeeklyStats('log', `💀 Efficiency: ${pct}%`);
                               addToast(`💀 F-Rank Efficiency (${pct}%). System punishes failure! +${dc} DC, -30 XP`, "penalty");
                               writeToDailyNote(`- [Efficiency] 💀 F-Rank — ${pct}% (${f}h / ${t}h) | HEAVY PENALTY +${dc} DC, -30 XP`);
                             }
                           }}>Calculate & Submit</button>
                        </div>
                      </div>
                    )}

                    {systemTab === "Study Log" && (() => {
                      const SR_INTERVALS = [3, 5, 7, 14, 30];
                      const SR_LABELS = ["1st Review", "2nd Review", "3rd Review", "4th Review", "Monthly"];
                      const today = new Date(); today.setHours(0,0,0,0);

                      const addDays = (dateStr, n) => {
                        const d = new Date(dateStr); d.setHours(0,0,0,0); d.setDate(d.getDate() + n); return getStudyDayKey(d);
                      };

                      const dueToday = studyLog.filter(e => {
                        if(e.currentStage >= SR_INTERVALS.length) return false;
                        const due = new Date(e.nextReviewDate); due.setHours(0,0,0,0);
                        return due <= today;
                      });

                      const markReviewed = (id) => {
                        setStudyLog(log => log.map(e => {
                          if(e.id !== id) return e;
                          const nextStage = e.currentStage + 1;
                          const todayStr = getStudyDayKey();
                          const nextReviewDate = nextStage < SR_INTERVALS.length ? addDays(todayStr, SR_INTERVALS[nextStage]) : null;
                          const entry = { ...e, currentStage: nextStage, nextReviewDate, reviewHistory: [...(e.reviewHistory||[]), todayStr] };
                          writeToDailyNote(`- [Study Review] ✅ ${e.subject} — ${e.chapter} | Stage ${nextStage}/${SR_INTERVALS.length} (${nextStage < SR_INTERVALS.length ? SR_LABELS[nextStage]+' in '+SR_INTERVALS[nextStage]+'d' : 'MASTERED 🏆'})`);
                          setXP(x => x + 20); setStats(s=>({...s, INT: s.INT+1}));
                          addToast(`📚 Reviewed: ${e.chapter}! +20 XP, +1 INT`, "loot");
                          return entry;
                        }));
                      };

                      return (
                        <div className="fade-in flex flex-col gap-6">
                          {/* Due for Review */}
                          {dueToday.length > 0 && (
                            <div className="bg-yellow-900/20 border border-yellow-500/60 rounded-xl p-5 shadow-[0_0_20px_#ecc94b22]">
                              <h3 className="text-yellow-400 font-black text-lg uppercase tracking-widest mb-4">⚠️ Due for Review ({dueToday.length})</h3>
                              <div className="flex flex-col gap-3">
                                {dueToday.map(e => (
                                  <div key={e.id} className="flex items-center justify-between bg-[#1a1c23] rounded-lg p-4 border border-yellow-500/40">
                                    <div>
                                      <div className="font-bold text-white">{e.chapter}</div>
                                      <div className="text-xs text-gray-400 mt-0.5">{e.subject} · <span className="text-yellow-400">{SR_LABELS[e.currentStage]}</span> · Studied {e.dateStudied}</div>
                                    </div>
                                    <button className="bg-gradient-to-r from-yellow-600 to-yellow-400 text-black font-black px-4 py-2 rounded text-xs uppercase hover:brightness-110 shadow-[0_0_10px_#ecc94b55]" onClick={()=>markReviewed(e.id)}>✓ Done</button>
                                  </div>
                                ))}
                              </div>
                            </div>
                          )}

                          {/* Log New Chapter */}
                          <div className="bg-[#1a1c23] rounded-xl p-5 border border-purple-500/50 shadow-[0_0_20px_#a259ff11]">
                            <h3 className="font-black text-lg glow-purple uppercase tracking-widest mb-4">📖 Log New Chapter</h3>
                            <div className="flex flex-col gap-3">
                              <div className="flex gap-3">
                                <div className="flex-1"><label className="sl-modal-label">Subject</label><input id="studySubject" className="sl-modal-input" placeholder="e.g. Biochemistry" /></div>
                                <div className="flex-1"><label className="sl-modal-label">Chapter / Topic</label><input id="studyChapter" className="sl-modal-input" placeholder="e.g. Ch.4 Glycolysis" /></div>
                              </div>
                              <div className="flex gap-3">
                                <div className="flex-1"><label className="sl-modal-label">Date Studied</label><input id="studyDate" type="date" className="sl-modal-input" defaultValue={getStudyDayKey()} /></div>
                                <div className="flex-1 flex items-end">
                                  <button className="sl-btn py-3 uppercase tracking-widest text-sm w-full" onClick={async ()=>{
                                    const subj = document.getElementById('studySubject').value.trim();
                                    const chap = document.getElementById('studyChapter').value.trim();
                                    const dateStr = document.getElementById('studyDate').value || getStudyDayKey();
                                    if(!subj || !chap) { addToast("Fill in subject and chapter.", "error"); return; }
                                    const entry = { id: Date.now(), subject: subj, chapter: chap, dateStudied: dateStr, currentStage: 0, nextReviewDate: addDays(dateStr, SR_INTERVALS[0]), reviewHistory: [] };
                                    setStudyLog(l => [entry, ...l]);
                                    setXP(x=>x+30); setStats(s=>({...s, INT: s.INT+2}));
                                    addToast(`📚 Logged: ${chap}! First review in 3 days. +30 XP, +2 INT`, "loot");
                                    updateWeeklyStats('log', `📖 Study Log: ${subj} — ${chap}`);
                                    await writeToDailyNote(`- [Study Log] 📖 ${subj} — ${chap} | Date: ${dateStr} | Next review: ${addDays(dateStr, SR_INTERVALS[0])}`);
                                    document.getElementById('studySubject').value='';
                                    document.getElementById('studyChapter').value='';
                                    document.getElementById('studyDate').value=getStudyDayKey();
                                  }}>Log Chapter</button>
                                </div>
                              </div>
                            </div>
                          </div>

                          {/* All Chapters */}
                          <div>
                            <h3 className="font-black text-lg glow-purple uppercase tracking-widest mb-4">All Chapters ({studyLog.length})</h3>
                            {studyLog.length === 0 && <div className="text-center text-gray-500 py-8 border border-dashed border-gray-700 rounded-lg">No chapters logged yet. Start studying, Hunter.</div>}
                            <div className="flex flex-col gap-3">
                              {studyLog.map(e => {
                                const mastered = e.currentStage >= SR_INTERVALS.length;
                                const dueDate = e.nextReviewDate ? new Date(e.nextReviewDate) : null;
                                if(dueDate) dueDate.setHours(0,0,0,0);
                                const overdue = !mastered && dueDate && dueDate < today;
                                const dueNow = !mastered && dueDate && dueDate.getTime() === today.getTime();
                                return (
                                  <div key={e.id} className={`bg-[#1a1c23] rounded-lg p-4 border flex items-center justify-between gap-4 ${mastered ? 'border-green-500/40' : overdue||dueNow ? 'border-yellow-500/50' : 'border-gray-700'}`}>
                                    <div className="flex-1 min-w-0">
                                      <div className="flex items-center gap-2 flex-wrap">
                                        <span className="font-bold text-white truncate">{e.chapter}</span>
                                        <span className="text-xs text-gray-500 bg-gray-800 px-2 py-0.5 rounded">{e.subject}</span>
                                        {mastered && <span className="text-xs bg-green-900/50 text-green-400 px-2 py-0.5 rounded border border-green-500/30">🏆 MASTERED</span>}
                                      </div>
                                      <div className="mt-2 flex gap-1 flex-wrap">
                                        {SR_INTERVALS.map((_, i) => (
                                          <div key={i} className={`text-[10px] px-2 py-0.5 rounded font-bold uppercase ${i < e.currentStage ? 'bg-green-900/40 text-green-400 border border-green-500/30' : i === e.currentStage && !mastered ? 'bg-yellow-900/40 text-yellow-400 border border-yellow-500/40' : 'bg-gray-800 text-gray-600 border border-gray-700'}`}>{SR_LABELS[i]}</div>
                                        ))}
                                      </div>
                                      {!mastered && <div className="text-xs text-gray-500 mt-1">Next: {e.nextReviewDate} {overdue ? <span className="text-red-400 font-bold">(OVERDUE)</span> : dueNow ? <span className="text-yellow-400 font-bold">(TODAY)</span> : ''}</div>}
                                    </div>
                                    <div className="flex gap-2 items-center shrink-0">
                                      {!mastered && (dueNow||overdue) && <button className="bg-gradient-to-r from-yellow-600 to-yellow-400 text-black font-black px-3 py-1.5 rounded text-xs uppercase hover:brightness-110" onClick={()=>markReviewed(e.id)}>✓ Review</button>}
                                      <button className="text-gray-600 hover:text-red-500 transition-colors" onClick={()=>setStudyLog(l=>l.filter(x=>x.id!==e.id))}>🗑️</button>
                                    </div>
                                  </div>
                                );
                              })}
                            </div>
                          </div>
                        </div>
                      );
                    })()}
                  </div>
                )}

                {activeCategory === "Combat" && (
                  <div className="fade-in">
                    <div className="flex gap-6 mb-6 border-b border-gray-700 pb-2 overflow-x-auto">
                      {["Raids", "Bosses", "Rivals"].map(tab => (
                        <button key={tab} className={`sl-tab ${combatTab === tab ? "sl-tab-active" : ""}`} onClick={() => setCombatTab(tab)}>{tab}</button>
                      ))}
                    </div>

                    {combatTab === "Raids" && (
                      <div>
