                        <div className="space-y-4">
                          {raids.map((r, i) => (
                            <div key={r.id} className="bg-[#1a1c23] rounded-xl p-5 border border-blue-500/30 flex items-center justify-between shadow-[0_0_15px_#3b82f611] hover:border-blue-400 transition-colors">
                              <div><div className="font-bold text-lg glow-blue uppercase">{r.name}</div><div className="text-sm text-gray-400 mt-1">Required: {r.xpReq} XP | Reward: <span className="text-yellow-400">{r.gold} Gold</span></div></div>
                              <div className="flex gap-3 items-center">
                                <button className={`sl-btn px-5 py-2 text-sm uppercase transition-all`} onClick={()=>{
                                  if(r.completed) { addToast("Gate already cleared.", "system"); return; }
                                  if(xp < r.xpReq) { addToast(`❌ Insufficient XP! Need ${r.xpReq}.`, "error"); return; }
                                  
                                  if(Math.random()>0.15){ setGold(g=>g+r.gold); setRaids(rs=>rs.map((rd,idx)=>idx===i?{...rd,completed:true}:rd)); updateWeeklyStats('log', `🏆 Raid Cleared: ${r.name}`); writeToDailyNote(`- [Raid] 🏆 Dungeon Cleared: ${r.name} | +${r.gold} Gold`); addToast(`🏆 Dungeon Cleared! +${r.gold} Gold`, "loot"); } 
                                  else { setDarkCrystals(d=>d+5); updateWeeklyStats('log', `💀 Raid Failed: ${r.name}`); writeToDailyNote(`- [Raid] 💀 Raid Failed: ${r.name} | +5 DC`); addToast("💀 Dungeon Raid Failed. System penalized you: +5 DC", "penalty"); }
                                }}>{r.completed ? 'Cleared' : 'Enter Gate'}</button>
                                <button className="text-gray-600 hover:text-red-500" onClick={()=>setRaids(rs=>rs.filter((_,idx)=>idx!==i))}>🗑️</button>
                              </div>
                            </div>
                          ))}
                          {raids.length===0 && <p className="text-center text-gray-500 mt-8 border border-dashed border-gray-700 rounded-lg p-6">No active Gates detected.</p>}
                        </div>
                      </div>
                    )}

                    {combatTab === "Bosses" && (
                       <div>
                        <div className="flex justify-end mb-4"><button className="sl-btn px-4 py-1.5 text-xs" onClick={()=>toggleModal('boss', true)}>+ SUMMON BOSS</button></div>
                        <div className="space-y-4">
                          {bosses.map((b, i) => (
                             <div key={b.id} className="bg-[#1a1c23] rounded-xl p-5 border border-red-500/50 flex items-center justify-between relative overflow-hidden shadow-[0_0_20px_rgba(229,62,62,0.15)]">
                               <div className="absolute top-0 right-0 w-32 h-32 bg-red-500/10 rounded-bl-full pointer-events-none"></div>
                               <div><div className="font-black text-xl text-red-400 drop-shadow-[0_0_8px_#e53e3e] uppercase">{b.name}</div><div className="text-sm text-gray-400 mt-1">Req: {b.xpReq} XP | <span className="text-red-500 font-bold">Lethal Penalty: {b.penalty} DC</span></div></div>
                               <div className="flex gap-3 z-10">
                                 <button className="bg-gradient-to-r from-red-600 to-red-800 text-white px-5 py-2 rounded font-bold uppercase shadow-[0_0_15px_#e53e3e66] hover:brightness-110 transition-all" onClick={()=>{
                                   if(b.completed) { addToast("Boss is already dead.", "system"); return; }
                                   if(xp < b.xpReq) { addToast(`❌ Insufficient XP! Need ${b.xpReq}.`, "error"); return; }
                                   
                                  if(Math.random()>0.3){ setGold(g=>g+b.gold); setBosses(bs=>bs.map((bx,idx)=>idx===i?{...bx,completed:true}:bx)); updateWeeklyStats('log', `👹 Boss Slain: ${b.name}`); writeToDailyNote(`- [Boss] 👹 Slain: ${b.name} | +${b.gold} Gold`); addToast(`👹 Boss Slain! Loot acquired! +${b.gold} Gold`, "loot"); } 
                                  else { setDarkCrystals(d=>d+b.penalty); updateWeeklyStats('log', `🩸 Boss Defeat: ${b.name}`); writeToDailyNote(`- [Boss] 🩸 Defeated by: ${b.name} | +${b.penalty} DC`); addToast(`🩸 Boss crushed your efforts. +${b.penalty} DC`, "penalty"); }
                                 }}>{b.completed ? 'Slain' : 'Challenge'}</button>
                                 <button className="text-gray-600 hover:text-red-500" onClick={()=>setBosses(bs=>bs.filter((_,idx)=>idx!==i))}>🗑️</button>
                               </div>
                             </div>
                          ))}
                        </div>
                       </div>
                    )}

                    {combatTab === "Rivals" && (
                      <div>
                        <div className="flex justify-end mb-4"><button className="sl-btn px-4 py-1.5 text-xs" onClick={()=>toggleModal('rival', true)}>+ REGISTER RIVAL</button></div>
                        <div className="grid sm:grid-cols-2 gap-5">
                          {rivals.map(r => (
                            <div key={r.id} className="bg-[#1a1c23] border border-purple-500/40 rounded-xl p-5 relative shadow-[0_0_15px_#a259ff11] hover:-translate-y-1 transition-transform group">
                               <button className="absolute top-4 left-4 text-gray-600 hover:text-red-500 transition-colors z-10" onClick={(e) => { e.stopPropagation(); setRivals(rs => rs.filter(x => x.id !== r.id)); }}>🗑️</button>
                               <div className="absolute top-4 right-4 text-3xl font-black text-gray-800 group-hover:text-purple-900/50 transition-colors">{r.rank}</div>
                               <div className="font-black text-xl glow-purple mb-1 text-center uppercase">{r.name}</div>
                               <div className="text-xs text-gray-400 mb-4 text-center uppercase tracking-wider">{r.type} Competitor</div>
                               
                               <div className="grid grid-cols-3 gap-2 mb-4 text-center border-t border-b border-gray-700 py-3">
                                  <div><div className="text-[10px] text-gray-500 uppercase">Focus</div><div className="font-bold text-blue-400 text-lg drop-shadow-[0_0_5px_#3b82f6]">{r.focus || '??'}</div></div>
                                  <div><div className="text-[10px] text-gray-500 uppercase">STR</div><div className="font-bold text-red-400 text-lg drop-shadow-[0_0_5px_#e53e3e]">{r.str || '??'}</div></div>
                                  <div><div className="text-[10px] text-gray-500 uppercase">INT</div><div className="font-bold text-green-400 text-lg drop-shadow-[0_0_5px_#10b981]">{r.int || '??'}</div></div>
                               </div>

                               <button className="sl-btn w-full py-2 text-sm uppercase tracking-widest shadow-lg" onClick={()=>toggleModal('duel', r)}>Initiate Duel</button>
                            </div>
                          ))}
                        </div>
                      </div>
                    )}
                  </div>
                )}

                {/* 3. JOURNEY */}
                {activeCategory === "Journey" && (
                  <div className="fade-in flex flex-col gap-8">
                    <div className="flex gap-6 border-b border-gray-700 pb-2 overflow-x-auto">
                      {["Main Arc", "Side Missions"].map(tab => (
                        <button key={tab} className={`sl-tab whitespace-nowrap ${journeyTab === tab ? "sl-tab-active" : ""}`} onClick={() => setJourneyTab(tab)}>{tab}</button>
                      ))}
                    </div>

                    {journeyTab === "Main Arc" && (
                      <div className="fade-in flex flex-col gap-8">
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                          <div className="bg-[#1a1c23] p-6 rounded-xl border-l-4 border-yellow-500 shadow-[0_0_20px_#ecc94b11]">
                            <h3 className="text-xs text-yellow-500 font-bold uppercase tracking-widest mb-2">Life Mission</h3>
                            {!lifeMission ? (
                              <input type="text" className="bg-transparent border-b border-gray-600 text-white outline-none w-full py-1 text-lg font-bold" placeholder="Define your ultimate purpose..." onBlur={e => setLifeMission(e.target.value)} onKeyDown={e=>{if(e.key==='Enter') setLifeMission(e.target.value)}} />
                            ) : (
                              <div className="group cursor-pointer" onClick={()=>setLifeMission("")}>
                                <p className="text-xl font-bold text-white leading-snug">{lifeMission}</p>
                                <p className="text-xs text-gray-500 mt-2 opacity-0 group-hover:opacity-100 transition-opacity">Click to edit</p>
                              </div>
                            )}
                          </div>

                          <div className="bg-[#1a1c23] p-6 rounded-xl border-l-4 border-purple-500 shadow-[0_0_20px_#a259ff11]">
                            <h3 className="text-xs text-purple-400 font-bold uppercase tracking-widest mb-2">Current Arc (Short-Term)</h3>
                            {!shortTermMission ? (
                              <input type="text" className="bg-transparent border-b border-gray-600 text-white outline-none w-full py-1 text-lg font-bold" placeholder="Your immediate focus..." onBlur={e => setShortTermMission(e.target.value)} onKeyDown={e=>{if(e.key==='Enter') setShortTermMission(e.target.value)}} />
                            ) : (
                              <div className="group cursor-pointer" onClick={()=>setShortTermMission("")}>
                                <p className="text-xl font-bold text-white leading-snug">{shortTermMission}</p>
                                <p className="text-xs text-gray-500 mt-2 opacity-0 group-hover:opacity-100 transition-opacity">Click to edit</p>
                              </div>
                            )}
                          </div>
                        </div>

                        <div className="bg-[#1a1c23] rounded-xl p-6 border border-gray-700 shadow-lg relative">
                          <div className="flex justify-between items-center mb-8">
                            <h3 className="text-xl font-black glow-gold uppercase tracking-widest">Hunter's Roadmap</h3>
                            <button className="sl-btn px-4 py-1.5 text-xs" onClick={()=>{
                              const title = prompt("Enter new milestone:");
                              if(title) { setRoadmap(r=>[...r, { id: Date.now(), title, completed: false }]); addToast("Milestone added to Roadmap.", "system"); }
                            }}>+ Add Milestone</button>
                          </div>
                          
                          <div className="timeline-container">
                            {roadmap.length === 0 && <p className="text-sm text-gray-500 italic">No milestones set. The path is unclear.</p>}
                            {roadmap.map(ms => (
                              <div key={ms.id} className={`relative flex justify-between items-center p-3 rounded-lg border ${ms.completed ? 'bg-gray-900 border-gray-800 opacity-60' : 'bg-[#23263a] border-purple-500/30'}`}>
                                <div className={`timeline-dot ${ms.completed ? 'timeline-dot-done' : ''}`}></div>
                                <span className={`text-lg font-bold ${ms.completed ? 'text-gray-500 line-through' : 'text-white'}`}>{ms.title}</span>
                                <div className="flex gap-3">
                                  <button className={`text-sm font-bold uppercase tracking-wider ${ms.completed ? 'text-yellow-500' : 'text-purple-400'}`} onClick={()=>{
                                    setRoadmap(r=>r.map(m=>m.id===ms.id ? {...m, completed: !m.completed} : m));
                                    if(!ms.completed) addToast("Milestone Achieved!", "loot");
                                  }}>{ms.completed ? 'Revert' : 'Achieve'}</button>
                                  <button className="text-gray-600 hover:text-red-500" onClick={()=>setRoadmap(r=>r.filter(m=>m.id!==ms.id))}>🗑️</button>
                                </div>
                              </div>
                            ))}
                          </div>
                        </div>
                      </div>
                    )}

                    {journeyTab === "Side Missions" && (
                      <div className="fade-in">
                        <div className="flex justify-between items-center mb-4">
                          <h3 className="font-bold text-lg glow-blue uppercase tracking-widest">Side Missions</h3>
                          <button className="sl-btn px-4 py-1.5 text-xs border border-blue-500/50" onClick={() => toggleModal('sideMission', true)}>+ ADD SIDE MISSION</button>
                        </div>
                        <div className="space-y-3">
                          {sideMissions.map((sm, i) => (
                            <div key={sm.id} className="flex justify-between items-center rounded-lg p-4 bg-[#1a1c23] border border-blue-500/30 hover:border-blue-400 transition-colors shadow-[0_0_15px_#3b82f611]">
                              <div>
                                <div className="font-bold text-lg text-white">{sm.name}</div>
                                <div className="text-xs text-blue-300 mt-1">Reward: {sm.stat ? `+${sm.statInc} ${sm.stat} • ` : ''} +{sm.xp} XP</div>

            <div className="fixed inset-0 bg-black z-[100] flex flex-col items-center justify-center">
              <button 
                className="absolute top-6 right-6 text-white/60 hover:text-white text-sm flex items-center gap-2 px-4 py-2 border border-white/20 rounded-lg hover:bg-white/10 transition-all disabled:opacity-40 disabled:cursor-not-allowed"
                onClick={() => {
                  if (isStudyRunning) {
                    addToast("Stop timer first before exiting fullscreen.", "system");
                    return;
                  }
                  setIsFullscreenTimer(false);
                }}
                disabled={isStudyRunning}
              >
                <span>🏠</span> Home (Esc)
              </button>
              <div className="text-center">
                <div
                  className="fullscreen-timer-readout font-black text-white tracking-wider leading-none"
                  style={{ fontFamily: "monospace" }}
                >
                  {formatDuration(currentStudySeconds)}
                </div>
                <div className="mt-8 flex gap-6 justify-center">
                  <button 
                    className="px-8 py-4 bg-white/10 hover:bg-white/20 text-white text-xl font-bold uppercase tracking-widest rounded-lg border border-white/30 transition-all disabled:opacity-30"
                    onClick={startStudySession}
                    disabled={isStudyRunning}
                  >
                    Start (Space)
                  </button>
                  <button 
                    className="px-8 py-4 bg-red-500/20 hover:bg-red-500/30 text-red-200 text-xl font-bold uppercase tracking-widest rounded-lg border border-red-500/50 transition-all disabled:opacity-30"
                    onClick={() => {
                      stopStudySession();
                      setIsFullscreenTimer(false);
                    }}
                    disabled={!isStudyRunning}
                  >
                    Stop (Space)
                  </button>
                </div>
                <p className="mt-6 text-white/40 text-sm uppercase tracking-widest">
                  {isStudyRunning ? "Stay focused, Hunter" : "Ready to grind?"}
                </p>
                <p className="mt-3 text-white/30 text-xs uppercase tracking-wider">
                  Shortcuts: F toggle fullscreen • Space start/stop • Esc exit • Ctrl+Shift+T pop out mini timer
                </p>
              </div>
            </div>
          )}

          {/* ADD MODALS */}
          {modals.shopItem && (
            <ModalWrapper title="Create Shop Item" onClose={() => toggleModal('shopItem', false)}>
              <label className="sl-modal-label">Shop Destination</label>
              <select id="siType" className="sl-modal-select"><option value="light">Light Shop (Gold)</option><option value="dark">Dark Shop (Dark Crystals)</option></select>
              <label className="sl-modal-label">Item Name</label><input id="siName" className="sl-modal-input" placeholder="e.g. Protein Shake" />
              <label className="sl-modal-label">Description / Effect</label><input id="siDesc" className="sl-modal-input" placeholder="e.g. Grants +2 STR" />
              <label className="sl-modal-label">Price</label><input id="siPrice" type="number" defaultValue="20" className="sl-modal-input" />
              <div className="flex gap-4">
                <div className="flex-1"><label className="sl-modal-label">Reward Type</label><select id="siRewardType" className="sl-modal-select"><option value="xp">XP</option>{Object.keys(stats).map(s=><option key={s} value={s}>Stat: {s}</option>)}</select></div>
                <div className="flex-1"><label className="sl-modal-label">Amount</label><input id="siInc" type="number" defaultValue="2" className="sl-modal-input" /></div>
              </div>
              <div className="flex items-center gap-3 mb-3 p-2 bg-purple-900/10 border border-purple-500/20 rounded">
                <input type="checkbox" id="siRankLock" className="w-5 h-5 accent-purple-600" />
                <label htmlFor="siRankLock" className="sl-modal-label mb-0 cursor-pointer">Enable Rank Lock</label>
              </div>
              <label className="sl-modal-label">Required Rank</label>
              <select id="siRank" className="sl-modal-select mb-2">
                {rankOrder.map(r => <option key={r} value={r}>{r}</option>)}
              </select>
              <button className="sl-btn w-full py-3 mt-2 text-lg" onClick={()=>{
                const type = document.getElementById('siType').value;
                const rType = document.getElementById('siRewardType').value;
                const rankLockEnabled = document.getElementById('siRankLock').checked;
                const requiredRank = rankLockEnabled ? document.getElementById('siRank').value : null;
                const newItem = { id: Date.now(), name: document.getElementById('siName').value, desc: document.getElementById('siDesc').value, price: parseInt(document.getElementById('siPrice').value), type: rType === 'xp' ? 'xp' : 'stat', stat: rType !== 'xp' ? rType : undefined, inc: parseInt(document.getElementById('siInc').value), requiredRank };
                if (!newItem.name) return;
                if (type === 'light') setLightShop(s => [...s, newItem]); else setDarkShop(s => [...s, newItem]);
                addToast("New item injected into System Shop.", "system"); toggleModal('shopItem', false);
              }}>Register Item</button>
            </ModalWrapper>
          )}

          {modals.quest && (
            <ModalWrapper title="Add Daily Directive" onClose={() => toggleModal('quest', false)}>
              <label className="sl-modal-label">Quest Name</label><input id="qName" className="sl-modal-input" placeholder="e.g. Read 20 Pages" />
              <div className="flex gap-4">
                <div className="flex-1"><label className="sl-modal-label">Stat</label><select id="qStat" className="sl-modal-select">{Object.keys(stats).map(s=><option key={s} value={s}>{s}</option>)}</select></div>
                <div className="flex-1"><label className="sl-modal-label">Increase</label><input id="qInc" type="number" defaultValue="2" className="sl-modal-input" /></div>
              </div>
              <div className="flex gap-4">
                <div className="flex-1"><label className="sl-modal-label">XP Reward</label><input id="qXP" type="number" defaultValue="20" className="sl-modal-input" /></div>
                <div className="flex-1"><label className="sl-modal-label">Gold Reward</label><input id="qGold" type="number" defaultValue="10" className="sl-modal-input" /></div>
              </div>
              <div className="flex items-center gap-3 mb-4 p-2 bg-purple-900/10 border border-purple-500/20 rounded">
                <input type="checkbox" id="qRepeat" className="w-5 h-5 accent-purple-600" />
                <label htmlFor="qRepeat" className="sl-modal-label mb-0 cursor-pointer">Repeatable (Doesn't deactivate after click)</label>
              </div>
              <button className="sl-btn w-full py-3 mt-2 text-lg" onClick={()=>{
                const n = document.getElementById('qName').value; if(!n) return;
                setQuests(qs =>[...qs, { id: Date.now(), name: n, stat: document.getElementById('qStat').value, statInc: parseInt(document.getElementById('qInc').value), xp: parseInt(document.getElementById('qXP').value), gold: parseInt(document.getElementById('qGold').value), done: false, isPenalty: false, repeatable: document.getElementById('qRepeat').checked }]);
                addToast("Directive Added.", "system"); toggleModal('quest', false);
              }}>Create Directive</button>
            </ModalWrapper>
          )}

          {modals.darkQuest && (
            <ModalWrapper title="Add Dark Directive" onClose={() => toggleModal('darkQuest', false)} borderClass="border-red-500" shadowClass="shadow-[0_0_40px_#e53e3e44]">
              <label className="sl-modal-label text-red-400">Dark Habit Name</label><input id="dqName" className="sl-modal-input border-red-500/50" placeholder="e.g. Skipped Workout" />
              <label className="sl-modal-label text-red-400">Stats to Drain (multi-select)</label>
              <div className="grid grid-cols-2 gap-2 bg-[#111318] border border-red-500/20 rounded p-2 mb-3">
                {Object.keys(stats).map(s => (
                  <label key={s} className="flex items-center gap-2 text-xs text-gray-200">
                    <input type="checkbox" className="dqStatChk accent-red-500" value={s} />
                    <span>{s}</span>
                  </label>
                ))}
              </div>
              <label className="sl-modal-label text-red-400">Stat Decrease (each selected stat)</label><input id="dqDec" type="number" defaultValue="1" className="sl-modal-input border-red-500/50" />
              <div className="flex gap-4">
                <div className="flex-1"><label className="sl-modal-label text-red-400">XP Loss</label><input id="dqXp" type="number" defaultValue="50" className="sl-modal-input border-red-500/50" /></div>
                <div className="flex-1"><label className="sl-modal-label text-red-400">DC Reward</label><input id="dqDc" type="number" defaultValue="10" className="sl-modal-input border-red-500/50" /></div>
              </div>
              <button className="bg-gradient-to-r from-red-600 to-red-900 text-white font-bold w-full py-3 mt-2 text-lg rounded uppercase shadow-[0_0_15px_#e53e3e66]" onClick={()=>{
                const n = document.getElementById('dqName').value; if(!n) return;
                const selectedStats = Array.from(document.querySelectorAll('.dqStatChk:checked')).map((el) => el.value);
                if (!selectedStats.length) { addToast("Select at least one stat to drain.", "error"); return; }
                const statDec = parseInt(document.getElementById('dqDec').value);
                const statDrains = selectedStats.map((stat) => ({ stat, amount: statDec }));
                setNegativeQuests(qs =>[...qs, { id: Date.now(), name: n, stat: selectedStats[0], statDec, statDrains, xpDec: parseInt(document.getElementById('dqXp').value), dcInc: parseInt(document.getElementById('dqDc').value) }]);
                addToast("Dark Directive Registered.", "penalty"); toggleModal('darkQuest', false);
              }}>Register Dark Quest</button>
            </ModalWrapper>
          )}

          {modals.sideMission && (
            <ModalWrapper title="Add Side Mission" onClose={() => toggleModal('sideMission', false)} borderClass="border-blue-500" shadowClass="shadow-[0_0_40px_#3b82f644]">
              <label className="sl-modal-label text-blue-400">Mission Title</label><input id="smName" className="sl-modal-input border-blue-500/50" placeholder="e.g. Read 1 Extra Chapter" />
              <div className="flex gap-4">
                <div className="flex-1"><label className="sl-modal-label text-blue-400">Stat Reward (Opt.)</label><select id="smStat" className="sl-modal-select border-blue-500/50"><option value="">None</option>{Object.keys(stats).map(s=><option key={s} value={s}>{s}</option>)}</select></div>
                <div className="flex-1"><label className="sl-modal-label text-blue-400">Stat Increase</label><input id="smInc" type="number" defaultValue="1" className="sl-modal-input border-blue-500/50" /></div>
              </div>
              <label className="sl-modal-label text-blue-400">XP Reward</label><input id="smXp" type="number" defaultValue="40" className="sl-modal-input border-blue-500/50" />
              <button className="bg-gradient-to-r from-blue-600 to-blue-800 text-white font-bold w-full py-3 mt-2 text-lg rounded uppercase shadow-[0_0_15px_#3b82f666]" onClick={()=>{
                const n = document.getElementById('smName').value; if(!n) return;
                setSideMissions(sms =>[...sms, { id: Date.now(), name: n, stat: document.getElementById('smStat').value || null, statInc: parseInt(document.getElementById('smInc').value), xp: parseInt(document.getElementById('smXp').value) }]);
                addToast("Side Mission Logged.", "system"); toggleModal('sideMission', false);
              }}>Add Mission</button>
            </ModalWrapper>
          )}

          {modals.raid && (
            <ModalWrapper title="Create Raid (Project)" onClose={() => toggleModal('raid', false)} borderClass="border-blue-500" shadowClass="shadow-[0_0_40px_#3b82f644]">
              <label className="sl-modal-label text-blue-400">Raid / Project Name</label><input id="rName" className="sl-modal-input border-blue-500/50" placeholder="e.g. Finish React Course" />
              <label className="sl-modal-label text-blue-400">Required XP to Enter</label><input id="rXP" type="number" defaultValue="150" className="sl-modal-input border-blue-500/50" />
              <label className="sl-modal-label text-blue-400">Gold Reward</label><input id="rGold" type="number" defaultValue="50" className="sl-modal-input border-blue-500/50" />
              <button className="bg-gradient-to-r from-blue-700 to-blue-500 text-white font-bold w-full py-3 mt-2 text-lg rounded uppercase shadow-[0_0_15px_#3b82f666]" onClick={()=>{
                const n = document.getElementById('rName').value; if(!n) return;
                setRaids(rs =>[...rs, { id: Date.now(), name: n, xpReq: parseInt(document.getElementById('rXP').value), gold: parseInt(document.getElementById('rGold').value), completed: false }]);
                addToast("Gate Opened.", "combat"); toggleModal('raid', false);
              }}>Open Gate</button>
            </ModalWrapper>
          )}

          {modals.boss && (
            <ModalWrapper title="Summon Boss" onClose={() => toggleModal('boss', false)} borderClass="border-red-500" shadowClass="shadow-[0_0_40px_#e53e3e44]">
              <label className="sl-modal-label text-red-400">Boss Name (Habit to Break)</label><input id="bName" className="sl-modal-input border-red-500/50" placeholder="e.g. Sugar Addiction" />
              <label className="sl-modal-label text-red-400">Required XP</label><input id="bXP" type="number" defaultValue="500" className="sl-modal-input border-red-500/50" />
              <label className="sl-modal-label text-red-400">Penalty (Dark Crystals)</label><input id="bPen" type="number" defaultValue="10" className="sl-modal-input border-red-500/50" />
              <button className="bg-gradient-to-r from-red-600 to-red-900 text-white font-bold w-full py-3 mt-2 text-lg rounded uppercase shadow-[0_0_15px_#e53e3e66]" onClick={()=>{
                const n = document.getElementById('bName').value; if(!n) return;
                setBosses(bs =>[...bs, { id: Date.now(), name: n, xpReq: parseInt(document.getElementById('bXP').value), gold: parseInt(document.getElementById('bXP').value)*2, penalty: parseInt(document.getElementById('bPen').value), completed: false, active: true }]);
                addToast("Boss Summoned. Prepare yourself.", "combat"); toggleModal('boss', false);
              }}>Summon Entity</button>
            </ModalWrapper>
          )}

          {modals.rival && <AddRivalModal onClose={()=>toggleModal('rival', false)} onAdd={r=>{setRivals(rs=>[...rs,r]); addToast("New Rival Registered in System.", "combat");}} />}

          {/* DAILY LOG VIEWER MODAL */}
          {dailyLogModal !== null && (
            <div className="fixed inset-0 flex items-center justify-center z-[1000] sl-modal-bg fade-in p-4">
              <div className="sl-modal-box w-full max-w-2xl border-2 border-purple-500 shadow-[0_0_40px_#a259ff44]">
                <button className="absolute top-4 right-4 text-gray-400 hover:text-white text-2xl font-black transition-colors" onClick={()=>setDailyLogModal(null)}>&times;</button>
                <div className="sl-modal-title">📖 Today's Journal Log</div>
                <pre className="bg-[#0f1115] rounded-lg p-4 border border-purple-500/30 text-sm text-gray-300 whitespace-pre-wrap max-h-[60vh] overflow-y-auto font-mono leading-relaxed">{dailyLogModal}</pre>
                <button className="sl-btn w-full py-2 mt-4 text-sm uppercase tracking-widest" onClick={()=>setDailyLogModal(null)}>Close</button>
              </div>
            </div>
          )}
          {/* LEGACY SYNC MODAL (no longer required for Anytype) */}
          {ffSyncModal && (
            <ModalWrapper title="Anytype Sync Setup" onClose={() => setFfSyncModal(false)} borderClass="border-yellow-500" shadowClass="shadow-[0_0_40px_#ecc94b44]">
              <div className="text-center mb-4">
                <div className="text-4xl mb-2">🦊</div>
                <p className="text-yellow-300 font-bold text-sm mb-2">Anytype Mode Enabled</p>
                <p className="text-gray-400 text-sm">Folder picking is not needed anymore. Logs stay inside app state and sync with remoteStorage, then you can open/copy/download into Anytype.</p>
              </div>
              <button className="sl-btn w-full py-3 font-bold uppercase tracking-widest shadow-[0_0_15px_#a259ff44]" onClick={()=>{
                setFfSyncModal(false);
                addToast("✅ Anytype sync instructions acknowledged.", "system");
              }}>Got it</button>
            </ModalWrapper>
          )}

          {modals.duel && (() => {
            const r = modals.duel;
            const rRankIdx = rankOrder.indexOf(r.rank);
            const isUnder = currentRankIdx < rRankIdx;
            return (
              <div className="fixed inset-0 flex items-center justify-center z-[1000] sl-modal-bg fade-in p-4">
                <div className={`sl-modal-box w-full max-w-md border-2 ${isUnder ? 'border-red-500 shadow-[0_0_40px_#e53e3e55]' : 'border-purple-500 shadow-[0_0_40px_#a259ff55]'}`}>
                  <button className="absolute top-4 right-4 text-gray-400 hover:text-white text-2xl font-black transition-colors" onClick={()=>toggleModal('duel', null)}>&times;</button>
                  <div className="text-center mb-6">
                    <h2 className="text-3xl font-black uppercase tracking-widest mb-1">{r.name}</h2>
                    <div className="inline-block bg-gray-800 px-3 py-1 rounded border border-gray-600 text-sm font-bold">Rank {r.rank} {r.type}</div>
                  </div>
                  <div className="bg-[#1a1c23] border border-gray-600 rounded-lg p-4 mb-6 shadow-inner text-left">
                     <h4 className="text-xs text-gray-500 uppercase font-black mb-3 tracking-widest border-b border-gray-700 pb-1">Combat Intel</h4>
                     <div className="grid grid-cols-2 gap-4 mb-3">
                        <div><span className="text-purple-400 font-bold">Focus:</span> {r.focus}</div>
                        <div><span className="text-red-400 font-bold">STR:</span> {r.str}</div>
                        <div><span className="text-green-400 font-bold">INT:</span> {r.int}</div>
                     </div>
                     <div><span className="text-yellow-500 font-bold text-sm block mb-1">Achievements:</span><span className="text-gray-300 text-sm italic">{r.achievements}</span></div>
                  </div>
                  {isUnder ? (
                    <div className="bg-red-900/20 border border-red-500 p-4 rounded-lg text-center mb-6 pulse-red">
                      <h3 className="text-red-500 font-black text-xl mb-2 uppercase">⚠️ FATAL WARNING</h3>
                      <p className="text-sm text-gray-300">System detects massive power disparity. Your rank ({currentRank.tier}) is lower than the Rival ({r.rank}). Engaging will likely result in crushing defeat.</p>
                    </div>
                  ) : (
                    <div className="bg-green-900/20 border border-green-500 p-4 rounded-lg text-center mb-6">
                      <h3 className="text-green-400 font-black text-xl mb-2 uppercase">✅ MATCH APPROVED</h3>
                      <p className="text-sm text-gray-300">Your stats align. You are authorized to initiate combat.</p>
                    </div>
                  )}
                  <div className="flex gap-4">
                    <button className="bg-gray-700 text-white flex-1 py-3 rounded font-bold uppercase hover:bg-gray-600" onClick={()=>toggleModal('duel', null)}>Retreat</button>
                    <button className={`flex-1 py-3 rounded font-black uppercase shadow-lg ${isUnder ? 'bg-red-600 hover:bg-red-500 text-white' : 'bg-gradient-to-r from-purple-600 to-purple-400 text-white'}`} onClick={()=>{
                      toggleModal('duel', null);
                      if (isUnder) {
                         if(Math.random() > 0.95) { setXP(x => x + 300); updateWeeklyStats('log', `🤯 Rival Duel Win: ${r.name} (Miracle)`); addToast(`🤯 MIRACLE WIN against ${r.name}! +300 XP`, "loot"); }
                         else { setDarkCrystals(d => d + 20); setXP(x => Math.max(0, x - 50)); updateWeeklyStats('log', `🩸 Rival Duel Loss: ${r.name}`); addToast(`🩸 CRUSHED by ${r.name}. Lost 50 XP, gained 20 DC.`, "penalty"); }
                      } else {
                         if(Math.random() > 0.20) { setXP(x => x + 100); setGold(g => g + 30); updateWeeklyStats('log', `🏆 Rival Duel Win: ${r.name}`); addToast(`🏆 Defeated ${r.name}! +100 XP, +30 Gold`, "combat"); }
                         else { setDarkCrystals(d => d + 5); updateWeeklyStats('log', `😤 Rival Duel Loss: ${r.name}`); addToast(`😤 Narrowly lost to ${r.name}. System grants +5 DC`, "system"); }
                      }
                    }}>{isUnder ? 'FIGHT ANYWAY' : 'ENGAGE COMBAT'}</button>
                  </div>
                </div>
              </div>
            );
          })()}

        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
